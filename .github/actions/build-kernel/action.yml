name: 'Build OnePlus Kernel with SukiSU Ultra'

inputs:
  op_config_json:
    description: 'JSON string containing full device config'
    required: true
    type: string

  ksu_type:
    description: 'Select KSU Type'
    required: true
    type: string
    default: SUKISU

  ksu_branch_or_hash:
    description: 'SukiSU Ultra branch or commit hash. Empty = builtin installer mode'
    required: false
    type: string
    default: ""

  susfs_commit_hash_or_branch:
    description: 'SUSFS branch or commit hash. Empty = auto-detect by kernel version'
    required: false
    type: string
    default: ""

  build_timestamp:
    description: 'Custom kernel build timestamp shown in uname -a, e.g. "Tue Feb 10 10:01:02 UTC 2026". Empty = current UTC build time.'
    required: false
    type: string
    default: ''

  enable_adios:
    description: 'Enable ADIOS I/O scheduler support'
    required: false
    type: boolean
    default: false

  optimize_level:
    description: 'Compiler optimization level, O2 or O3'
    required: false
    type: string
    default: O2

  clean:
    description: 'Force clean build without ccache acceleration'
    required: false
    type: boolean
    default: false

  debug:
    description: 'Enable dumping debug related artifacts'
    required: false
    type: boolean
    default: false

  github_token:
    description: 'GitHub Token'
    required: true

outputs:
  kernel_version:
    description: 'Full kernel version string'
    value: ${{ steps.save_metadata.outputs.kernel_version }}

  ksu_version:
    description: 'SukiSU Ultra version number'
    value: ${{ steps.save_metadata.outputs.ksu_version }}

  ksu_type:
    description: 'KernelSU variant'
    value: ${{ steps.save_metadata.outputs.ksu_type }}

  susfs_version:
    description: 'SUSFS version string'
    value: ${{ steps.save_metadata.outputs.susfs_version }}

  build_timestamp:
    description: 'Effective kernel build timestamp used in uname -a'
    value: ${{ steps.save_metadata.outputs.build_timestamp }}

  image_sha256:
    description: 'SHA256 hash of kernel Image'
    value: ${{ steps.collect_stats.outputs.image_sha256 }}

  zip_sha256:
    description: 'SHA256 hash of AnyKernel3 ZIP'
    value: ${{ steps.create_zip.outputs.zip_sha256 }}

  warnings:
    description: 'Number of compiler warnings'
    value: ${{ steps.collect_stats.outputs.warnings_count }}

  build_time:
    description: 'Total build time in seconds'
    value: ${{ steps.collect_stats.outputs.build_time }}

  ccache_hit_rate:
    description: 'ccache hit rate percentage'
    value: ${{ steps.ccache_stats.outputs.hit_rate }}

  ccache_direct_rate:
    description: 'ccache direct hit rate percentage'
    value: ${{ steps.ccache_stats.outputs.direct_rate }}

  zip_name:
    description: 'Name of the generated flashable ZIP'
    value: ${{ steps.create_zip.outputs.zip_name }}

runs:
  using: 'composite'
  steps:
    - name: Get Action info
      shell: bash
      env:
        ACTION_REPO_VAL: ${{ github.action_repository }}
        ACTION_REF_VAL: ${{ github.action_ref }}
      run: |
        set -euo pipefail
        echo "ACTION_REPO=$ACTION_REPO_VAL" >> "$GITHUB_ENV"
        echo "ACTION_REF=$ACTION_REF_VAL" >> "$GITHUB_ENV"

    - name: 📥 Checkout Action Code
      uses: actions/checkout@v6
      with:
        repository: ${{ env.ACTION_REPO }}
        ref: ${{ env.ACTION_REF }}
        path: action-source
        fetch-depth: 1

    - name: Parse op_config_json
      shell: bash
      run: |
        set -euo pipefail
        echo '${{ inputs.op_config_json }}' > /tmp/config.json
        jq -r 'to_entries[] | "OP_\(.key | ascii_upcase)=\(.value)"' /tmp/config.json >> "$GITHUB_ENV"
        echo "Parsed config:"
        jq '.' /tmp/config.json

    - name: Validate KSU Type
      shell: bash
      run: |
        set -euo pipefail

        if [ "${{ inputs.ksu_type }}" != "SUKISU" ]; then
          echo "::error::This action only supports SUKISU/SukiSU Ultra. Got: ${{ inputs.ksu_type }}"
          exit 1
        fi

        echo "✅ KSU type validated: ${{ inputs.ksu_type }}"

    - name: Validate Inputs
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Validate inputs"

        model="${OP_MODEL:-}"
        soc="${OP_SOC:-}"
        branch="${OP_BRANCH:-}"
        manifest="${OP_MANIFEST:-}"
        android_version="${OP_ANDROID_VERSION:-}"
        kernel_version="${OP_KERNEL_VERSION:-}"
        os_version="${OP_OS_VERSION:-}"
        hmbird="${OP_HMBIRD:-}"
        susfs="${OP_SUSFS:-}"
        bbg="${OP_BBG:-}"
        bbr="${OP_BBR:-}"
        ttl="${OP_TTL:-}"
        ip_set="${OP_IP_SET:-}"
        rust_build="${OP_RUST_BUILD:-}"
        lto="${OP_LTO:-}"
        uname="${OP_UNAME:-}"
        unicode="${OP_UNICODE:-}"
        ds="${OP_DS:-}"
        ntsync="${OP_NTSYNC:-}"
        optimize='${{ inputs.optimize_level }}'

        errors=()

        if [[ -z "$model" ]]; then
          errors+=("Input 'model' cannot be empty")
        elif [[ ! "$model" =~ ^OP ]]; then
          errors+=("Input 'model' does not start with 'OP'. Got: '$model'")
        fi

        if [[ -z "$soc" ]]; then
          errors+=("Input 'soc' cannot be empty")
        elif [[ ! "$soc" =~ ^[A-Za-z0-9_-]+$ ]]; then
          errors+=("Input 'soc' contains invalid characters. Got: '$soc'")
        fi

        if [[ -z "$branch" ]]; then
          errors+=("Input 'branch' cannot be empty")
        elif [[ ! "$branch" =~ ^[A-Za-z0-9._/-]+$ ]]; then
          errors+=("Input 'branch' contains invalid characters. Got: '$branch'")
        fi

        if [[ -z "$manifest" ]]; then
          errors+=("Input 'manifest' cannot be empty")
        elif [[ "$manifest" == http*://* ]]; then
          if [[ ! "$manifest" =~ ^https:// ]]; then
            errors+=("Manifest URL must be HTTPS. Got: '$manifest'")
          fi
          if [[ ! "$manifest" =~ \.xml($|\?) ]]; then
            errors+=("Manifest URL should point to an XML file. Got: '$manifest'")
          fi
        else
          if [[ ! "$manifest" =~ \.xml$ ]]; then
            errors+=("Manifest filename must end with .xml. Got: '$manifest'")
          fi
          if [[ "$manifest" =~ [[:space:]] ]]; then
            errors+=("Manifest filename cannot contain spaces. Got: '$manifest'")
          fi
        fi

        if [[ -z "$android_version" ]]; then
          errors+=("Input 'android_version' cannot be empty")
        elif [[ ! "$android_version" =~ ^android[0-9]+$ ]]; then
          errors+=("Input 'android_version' must be android followed by a number. Got: '$android_version'")
        fi

        if [[ -z "$kernel_version" ]]; then
          errors+=("Input 'kernel_version' cannot be empty")
        elif [[ ! "$kernel_version" =~ ^[0-9]+\.[0-9]+$ ]]; then
          errors+=("Input 'kernel_version' must be X.Y format. Got: '$kernel_version'")
        fi

        if [[ -z "$os_version" ]]; then
          errors+=("Input 'os_version' cannot be empty")
        elif [[ ! "$os_version" =~ ^OOS ]]; then
          errors+=("Input 'os_version' does not start with OOS. Got: '$os_version'")
        fi

        for bool_name in hmbird susfs bbg bbr ttl ip_set rust_build unicode ds ntsync; do
          bool_value="${!bool_name}"
          if [[ -z "$bool_value" ]]; then
            errors+=("Input '$bool_name' cannot be empty")
          elif [[ "$bool_value" != "true" && "$bool_value" != "false" ]]; then
            errors+=("Input '$bool_name' must be true or false. Got: '$bool_value'")
          fi
        done

        if [[ -z "$lto" ]]; then
          errors+=("Input 'lto' cannot be empty")
        elif [[ "$lto" != "none" && "$lto" != "thin" && "$lto" != "full" ]]; then
          errors+=("Input 'lto' must be thin, full, or none. Got: '$lto'")
        fi

        if [[ -z "$uname" ]]; then
          errors+=("Input 'uname' cannot be empty")
        elif [[ ${#uname} -gt 44 ]]; then
          errors+=("Input 'uname' too long. Maximum length: 44. Got: '$uname'")
        fi

        case "$optimize" in
          O2|O3) ;;
          *) errors+=("optimize_level must be O2 or O3. Got: '$optimize'") ;;
        esac

        if [ ${#errors[@]} -ne 0 ]; then
          echo "Found ${#errors[@]} validation error(s):" >&2
          for error in "${errors[@]}"; do
            echo "  - $error" >&2
          done
          echo "::error::Input validation failed. See logs for details."
          exit 1
        fi

        echo "✅ Input validation passed"
        echo "::endgroup::"

    - name: Setup Base Environment
      shell: bash
      run: |
        set -euo pipefail

        CONFIG="$OP_MODEL"
        mkdir -p "$CONFIG"

        echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"

        REPO="/usr/local/bin/repo"
        if [ ! -x "$REPO" ]; then
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO"
          chmod +x "$REPO"
        fi

        echo "REPO=$REPO" >> "$GITHUB_ENV"

        CCACHE_DIR="$GITHUB_WORKSPACE/.ccache/${OP_MODEL}/${OP_OS_VERSION}"
        LDCACHE_DIR="$GITHUB_WORKSPACE/.ldcache/${OP_MODEL}/${OP_OS_VERSION}"
        CCACHE_LOGFILE="$GITHUB_WORKSPACE/ccache.log"

        mkdir -p "$CCACHE_DIR" "$LDCACHE_DIR"

        {
          echo "CCACHE_DIR=$CCACHE_DIR"
          echo "LDCACHE_DIR=$LDCACHE_DIR"

          if [ "${{ inputs.debug }}" = "true" ]; then
            echo "CCACHE_LOGFILE=$CCACHE_LOGFILE"
          fi

          echo "CCACHE_BASEDIR=$GITHUB_WORKSPACE"
          echo "CCACHE_MAXSIZE=8G"
          echo "CCACHE_COMPILERCHECK=content"
          echo "CCACHE_COMPRESS=true"
          echo "CCACHE_COMPRESSLEVEL=3"
          echo "CCACHE_DIRECT=true"
          echo "CCACHE_FILECLONE=true"
          echo "CCACHE_INODECACHE=true"
          echo "CCACHE_NOHASHDIR=true"
          echo "CCACHE_IGNOREOPTIONS=--sysroot*"
          echo "CCACHE_SLOPPINESS=file_macro,time_macros,include_file_mtime,include_file_ctime"
          echo "CCACHE_NOREADONLY_DIRECT=true"
        } >> "$GITHUB_ENV"

    - name: Optimize Global Git for Repo Tool
      shell: bash
      run: |
        set -euo pipefail
        git config --global feature.manyFiles true
        git config --global core.fsmonitor true
        git config --global pack.sparse true

    - name: Sync Kernel Source
      id: sync-kernel-source
      uses: ./action-source/.github/actions/kernel-source-sync
      with:
        source_location: ${{ env.CONFIG }}
        github_token: ${{ inputs.github_token }}
        debug: ${{ inputs.debug }}

    - name: Set Dir Paths
      shell: bash
      run: |
        set -euo pipefail

        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        KERNEL_PLATFORM_DIR="$CONFIG_DIR/kernel_platform"
        COMMON_KERNEL_DIR="$KERNEL_PLATFORM_DIR/common"
        MSM_KERNEL_DIR="$KERNEL_PLATFORM_DIR/msm-kernel"
        AK3_DIR="$CONFIG_DIR/AnyKernel3"
        DEBUG_ARTIFACTS_DIR="$GITHUB_WORKSPACE/debug_artifacts"
        KERNEL_PATCHES_DIR="$GITHUB_WORKSPACE/kernel_patches"
        SUSFS_DIR="$GITHUB_WORKSPACE/susfs4ksu"
        KSU_DIR="$KERNEL_PLATFORM_DIR/KernelSU"

        mkdir -p "$ARTIFACTS_DIR" "$DEBUG_ARTIFACTS_DIR"

        {
          echo "CONFIG_FOLDER=$CONFIG_DIR"
          echo "ARTIFACTS_FOLDER=$ARTIFACTS_DIR"
          echo "KERNEL_PLATFORM_FOLDER=$KERNEL_PLATFORM_DIR"
          echo "COMMON_KERNEL_FOLDER=$COMMON_KERNEL_DIR"
          echo "MSM_KERNEL_FOLDER=$MSM_KERNEL_DIR"
          echo "AK3_FOLDER=$AK3_DIR"
          echo "DEBUG_ARTIFACTS_FOLDER=$DEBUG_ARTIFACTS_DIR"
          echo "KERNEL_PATCHES_FOLDER=$KERNEL_PATCHES_DIR"
          echo "SUSFS_FOLDER=$SUSFS_DIR"
          echo "KSU_FOLDER=$KSU_DIR"
          echo "DEBUG_ZIP_NAME=debug_${OP_MODEL}_${OP_OS_VERSION}.zip"
        } >> "$GITHUB_ENV"

    - name: Set Kernel build-tools to Path
      shell: bash
      run: |
        set -euo pipefail
        echo "${KERNEL_PLATFORM_FOLDER}/prebuilts/kernel-build-tools/linux-x86/bin/" >> "$GITHUB_PATH"
        echo "${KERNEL_PLATFORM_FOLDER}/prebuilts/kernel-build-tools/linux_musl-x86/bin/" >> "$GITHUB_PATH"

    - name: Get Kernel Version Info
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Get kernel version"

        cd "$COMMON_KERNEL_FOLDER"

        CONFIG_FILES=("build.config.common" "build.config.constants")
        BRANCH_LINE=""

        for f in "${CONFIG_FILES[@]}"; do
          if [ -f "$f" ]; then
            l="$(grep '^[[:space:]]*BRANCH=' "$f" || true)"
            if [ -n "$l" ]; then
              BRANCH_LINE="$l"
              break
            fi
          fi
        done

        if [ -z "$BRANCH_LINE" ]; then
          echo "::error::No BRANCH= found in config files"
          exit 1
        fi

        BRANCH_VALUE="${BRANCH_LINE#*=}"
        BRANCH_VALUE="${BRANCH_VALUE%\"}"
        BRANCH_VALUE="${BRANCH_VALUE#\"}"

        ANDROID_VERSION="$(echo "$BRANCH_VALUE" | grep -oE '^android[0-9]+' || true)"

        if [ -z "$ANDROID_VERSION" ]; then
          echo "::error::Failed to parse Android version from BRANCH=$BRANCH_VALUE"
          exit 1
        fi

        VERSION="$(grep '^VERSION *=' Makefile | awk '{print $3}')"
        PATCHLEVEL="$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')"
        SUBLEVEL="$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')"

        if [ -z "$VERSION" ] || [ -z "$PATCHLEVEL" ] || [ -z "$SUBLEVEL" ]; then
          echo "::error::Failed to parse kernel VERSION/PATCHLEVEL/SUBLEVEL from Makefile"
          echo "VERSION=$VERSION PATCHLEVEL=$PATCHLEVEL SUBLEVEL=$SUBLEVEL"
          exit 1
        fi

        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"

        cd "$ARTIFACTS_FOLDER"

        {
          echo "$ANDROID_VERSION-$FULL_VERSION"
          echo "$OP_OS_VERSION"
        } > "${OP_MODEL}_${OP_OS_VERSION}.txt"

        {
          echo "ANDROID_VER=$ANDROID_VERSION"
          echo "KERNEL_VER=$VERSION.$PATCHLEVEL"
          echo "TKERNEL_VER=$FULL_VERSION"
          echo "KERNEL_FULL_VER=$ANDROID_VERSION-$FULL_VERSION"

          if [ "${OP_SUSFS:-false}" = "true" ]; then
            echo "SUSFS_KERNEL_BRANCH=gki-$ANDROID_VERSION-$VERSION.$PATCHLEVEL"
          fi
        } >> "$GITHUB_ENV"

        echo "Detected BRANCH: $BRANCH_VALUE"
        echo "Detected Android version: $ANDROID_VERSION"
        echo "Detected kernel version: $FULL_VERSION"
        echo "✅ Detected: $ANDROID_VERSION-$FULL_VERSION"
        echo "::endgroup::"

    - name: 🏷️ Set Build Identity
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Set build user/host"

        BUILD_USER="OnePlus"
        BUILD_HOST="ubuntu-build"

        {
          echo "BUILD_USER=$BUILD_USER"
          echo "BUILD_HOST=$BUILD_HOST"
        } >> "$GITHUB_ENV"

        echo "✅ Build identity configured:"
        echo "   User: $BUILD_USER"
        echo "   Host: $BUILD_HOST"
        echo "::endgroup::"

    - name: Check or Detect Clang
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Detect Clang"

        CLANG_FOUND=false
        CLANG_BIN=""

        if [ -n "${OP_ZYC_COMPILER:-}" ]; then
          echo "OP_ZYC_COMPILER detected: $OP_ZYC_COMPILER"

          ZYC_DIR="$CONFIG_FOLDER/compiler/zyc"
          TEMP_TAR="$CONFIG_FOLDER/compiler.tar.gz"
          mkdir -p "$ZYC_DIR"

          if curl -L --fail --retry 5 --retry-delay 5 --connect-timeout 60 -o "$TEMP_TAR" "$OP_ZYC_COMPILER"; then
            tar -xzf "$TEMP_TAR" -C "$ZYC_DIR" 2>/dev/null || true
            rm -f "$TEMP_TAR"

            if [ -x "$ZYC_DIR/bin/clang" ]; then
              CLANG_BIN="$ZYC_DIR/bin"
              CLANG_FOUND=true
            fi
          fi

        elif [ -n "${OP_C_COMPILER:-}" ]; then
          if [ -x "$CONFIG_FOLDER/$OP_C_COMPILER/clang" ]; then
            CLANG_BIN="$CONFIG_FOLDER/$OP_C_COMPILER"
            CLANG_FOUND=true
          fi
        fi

        if [ "$CLANG_FOUND" = false ]; then
          for base in "$KERNEL_PLATFORM_FOLDER/prebuilts" "$KERNEL_PLATFORM_FOLDER/prebuilts-master"; do
            [ -d "$base/clang/host/linux-x86" ] || continue
            latest="$(ls -d "$base/clang/host/linux-x86/clang-r"* 2>/dev/null | sort -V | tail -n1 || true)"

            if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
              CLANG_BIN="$latest/bin"
              CLANG_FOUND=true
              break
            fi
          done
        fi

        if [ "$CLANG_FOUND" = false ] && command -v clang >/dev/null 2>&1; then
          CLANG_BIN="$(dirname "$(command -v clang)")"
          CLANG_FOUND=true
        fi

        [ "$CLANG_FOUND" = true ] || {
          echo "::error::No clang toolchain found"
          exit 1
        }

        CLANG_VERSION="$("$CLANG_BIN/clang" --version | head -n1)"
        short="$("$CLANG_BIN/clang" --version | sed -n '1s/.*clang-r\([0-9.]\+\).*/\1/p')"

        if [ -z "$short" ]; then
          short="$("$CLANG_BIN/clang" --version | sha256sum | cut -c1-8)"
        fi

        {
          echo "CLANG_BIN_PATH=$CLANG_BIN"
          echo "CLANG_VERSION=$CLANG_VERSION"
          echo "CLANG_VERSION_SHORT=$short"
          echo "LIBCLANG_PATH=$CLANG_BIN/../lib"
        } >> "$GITHUB_ENV"

        echo "$CLANG_BIN" >> "$GITHUB_PATH"

        echo "✅ Detected Clang: $CLANG_VERSION"
        echo "::endgroup::"

    - name: Check or Detect Rust and bindgen
      shell: bash
      if: ${{ env.OP_RUST_BUILD == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Detect Rust and bindgen"

        RUSTC_FOUND=false
        BINDGEN_FOUND=false

        if [ -z "${OP_RUST_COMPILER:-}" ]; then
          for base in "$KERNEL_PLATFORM_FOLDER/prebuilts" "$KERNEL_PLATFORM_FOLDER/prebuilts-master"; do
            [ -d "$base/rust/linux-x86" ] || continue
            latest="$(ls -d "$base/rust/linux-x86/1."* 2>/dev/null | sort -V | tail -n1 || true)"

            if [ -n "$latest" ] && [ -x "$latest/bin/rustc" ]; then
              RUSTC_BIN="$latest/bin"
              RUSTC_FOUND=true
              break
            fi
          done
        else
          if [ -x "$CONFIG_FOLDER/$OP_RUST_COMPILER/rustc" ]; then
            RUSTC_BIN="$CONFIG_FOLDER/$OP_RUST_COMPILER"
            RUSTC_FOUND=true
          fi
        fi

        if [ -z "${OP_BINDGEN:-}" ]; then
          for base in "$KERNEL_PLATFORM_FOLDER/prebuilts" "$KERNEL_PLATFORM_FOLDER/prebuilts-master"; do
            if [ -x "$base/clang-tools/linux-x86/bin/bindgen" ]; then
              BINDGEN_BIN="$base/clang-tools/linux-x86/bin"
              BINDGEN_FOUND=true
              chmod +x "$BINDGEN_BIN/bindgen"
              break
            fi
          done
        else
          if [ -x "$CONFIG_FOLDER/$OP_BINDGEN/bindgen" ]; then
            BINDGEN_BIN="$CONFIG_FOLDER/$OP_BINDGEN"
            BINDGEN_FOUND=true
            chmod +x "$BINDGEN_BIN/bindgen"
          fi
        fi

        [ "$RUSTC_FOUND" = true ] || {
          echo "::error::No Rust toolchain found"
          exit 1
        }

        {
          echo "RUSTC_BIN_PATH=$RUSTC_BIN"
          echo "RUSTC=$RUSTC_BIN/rustc"
        } >> "$GITHUB_ENV"

        echo "$RUSTC_BIN" >> "$GITHUB_PATH"

        if [ "$BINDGEN_FOUND" = true ]; then
          {
            echo "BINDGEN_BIN_PATH=$BINDGEN_BIN"
            echo "BINDGEN=$BINDGEN_BIN/bindgen"
          } >> "$GITHUB_ENV"

          echo "$BINDGEN_BIN" >> "$GITHUB_PATH"
        fi

        echo "✅ Rust/bindgen detection complete"
        echo "::endgroup::"

    - name: Restore ccache cache
      id: restore-ccache-cache
      uses: ./action-source/.github/actions/cache/restore
      if: ${{ inputs.clean == false || inputs.clean == 'false' }}
      with:
        cache_path: ${{ env.CCACHE_DIR }}
        cache_key: SUKISU-v3-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-${{ env.KERNEL_FULL_VER }}-${{ env.CLANG_VERSION_SHORT }}
        cache_bucket: "ccache-cache"
        debug: ${{ inputs.debug }}
        restore_keys: |
          SUKISU-v3-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-${{ env.KERNEL_FULL_VER }}-
          SUKISU-v3-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-

    - name: Restore LTO LD cache
      id: restore-lto-ld-cache
      uses: ./action-source/.github/actions/cache/restore
      if: ${{ (inputs.clean == false && env.OP_LTO != 'none') || (inputs.clean == 'false' && env.OP_LTO != 'none') }}
      with:
        cache_path: ${{ env.LDCACHE_DIR }}
        cache_key: SUKISU-v3-LTO-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-${{ env.KERNEL_FULL_VER }}-${{ env.CLANG_VERSION_SHORT }}
        cache_bucket: "lto-cache"
        debug: ${{ inputs.debug }}
        restore_keys: |
          SUKISU-v3-LTO-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-${{ env.KERNEL_FULL_VER }}-
          SUKISU-v3-LTO-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-

    - name: Check ccache
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Check ccache"

        echo "/usr/lib/ccache" >> "$GITHUB_PATH"

        sanitize_ccache_env() {
          unset CCACHE_DEPEND || true
          unset CCACHE_READONLY_DIRECT || true
          unset CCACHE_COMPRESSION || true
          unset CCACHE_COMPRESSION_LEVEL || true
          unset CCACHE_FILE_CLONE || true
          unset CCACHE_INODE_CACHE || true

          export CCACHE_COMPILERCHECK=content
          export CCACHE_COMPRESS=true
          export CCACHE_COMPRESSLEVEL=3
          export CCACHE_DIRECT=true
          export CCACHE_FILECLONE=true
          export CCACHE_INODECACHE=true
          export CCACHE_NOREADONLY_DIRECT=true
          export CCACHE_NOHASHDIR=true
          export CCACHE_IGNOREOPTIONS="--sysroot*"
        }

        sanitize_ccache_env

        echo "Active ccache variables:"
        env | sort | grep '^CCACHE_' || true

        echo ""
        echo "Checking for forbidden variables..."

        if env | grep -q '^CCACHE_DEPEND='; then
          echo "::error::CCACHE_DEPEND is still set"
          exit 1
        fi

        if env | grep -q '^CCACHE_READONLY_DIRECT='; then
          echo "::error::CCACHE_READONLY_DIRECT is still set"
          exit 1
        fi

        echo ""
        echo "ccache config:"
        sanitize_ccache_env
        ccache -p || true

        if [ -d "$CCACHE_DIR" ] && find "$CCACHE_DIR" -type f -print -quit 2>/dev/null | grep -q .; then
          echo "✅ Restored cache found"
          sanitize_ccache_env
          ccache -s | head -n 30 || true
          find "$CCACHE_DIR" -type f -exec touch -t "$(date -d "1 day ago" +%Y%m%d%H%M)" {} + || true
        else
          echo "⚠️ No existing cache"
        fi

        sanitize_ccache_env
        ccache -z || true

        echo "::endgroup::"
        
    - name: Fetch SusFS and Other Dependencies
      shell: bash
      run: |
        echo "::group::Fetch dependencies"
        set -euo pipefail

        cd "$GITHUB_WORKSPACE"

        echo "Working directory: $(pwd)"
        echo "Fetching SusFS and other dependencies..."

        ensure_tool() {
          local tool="$1"
          local package="$2"

          if command -v "$tool" >/dev/null 2>&1; then
            echo "✅ Found $tool: $(command -v "$tool")"
            return 0
          fi

          echo "$tool not found. Installing package: $package"

          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y "$package"
          else
            apt-get update
            apt-get install -y "$package"
          fi

          command -v "$tool" >/dev/null 2>&1 || {
            echo "::error::Failed to install required tool: $tool"
            exit 1
          }
        }

        ensure_tool aria2c aria2
        ensure_tool pigz pigz

        if [ "${OP_SUSFS:-false}" = "true" ]; then
          SUSFS_INPUT="${{ inputs.susfs_commit_hash_or_branch }}"

          declare -A DEFAULT_SUSFS=(
            ["android12-5.10"]="gki-android12-5.10"
            ["android13-5.15"]="gki-android13-5.15"
            ["android14-6.1"]="gki-android14-6.1"
            ["android15-6.6"]="gki-android15-6.6"
            ["android16-6.12"]="gki-android16-6.12"
          )

          KERNEL_KEY="${ANDROID_VER}-${KERNEL_VER}"

          if [ -z "$SUSFS_INPUT" ]; then
            SUSFS_BRANCH="${DEFAULT_SUSFS[$KERNEL_KEY]:-gki-android15-6.6}"
            echo "Using default SUSFS branch for $KERNEL_KEY: $SUSFS_BRANCH"
          else
            SUSFS_BRANCH="$SUSFS_INPUT"
            echo "Using resolved SUSFS ref: $SUSFS_BRANCH"
          fi
        fi

        retry_fetch_archive() {
          local url="$1"
          local branch="${2:-main}"
          local target_dir="${3:-}"

          local max_attempts=3
          local attempt=1

          local repo_name
          repo_name="$(basename "$url" .git)"

          if [ -z "$target_dir" ]; then
            target_dir="$GITHUB_WORKSPACE/$repo_name"
          fi

          local safe_branch
          safe_branch="$(echo "$branch" | tr '/' '_')"

          local archive_name="${repo_name}_${safe_branch}.tar.gz"
          local shm_path="/dev/shm/$archive_name"

          local nproc_count
          nproc_count="$(nproc 2>/dev/null || echo 4)"

          local aria_log_flags="--quiet --summary-interval=0"
          if [ "${{ inputs.debug }}" = "true" ]; then
            aria_log_flags="--summary-interval=5"
          fi

          local aria2_headers=(
            "--header=User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
            "--header=Accept: */*"
            "--header=Connection: keep-alive"
          )

          local download_url=""

          if [[ "$url" == *"github.com"* ]]; then
            download_url="${url%.git}/archive/refs/heads/${branch}.tar.gz"
          elif [[ "$url" == *"gitlab.com"* ]]; then
            download_url="${url%.git}/-/archive/${branch}/${repo_name}-${branch}.tar.gz"
          else
            echo "::error::Unsupported host: $url"
            return 1
          fi

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Attempt $attempt/$max_attempts: high-speed fetch for $repo_name ($branch)"
            echo "Download URL: $download_url"
            echo "Target dir: $target_dir"

            rm -f "$shm_path"
            rm -rf "$target_dir"
            mkdir -p "$target_dir"

            if aria2c \
              -x16 -s16 -j16 -k1M \
              --retry-wait=2 \
              --max-tries=5 \
              -d "/dev/shm" \
              -o "$archive_name" \
              --allow-overwrite=true \
              "${aria2_headers[@]}" \
              $aria_log_flags \
              "$download_url"; then

              if tar \
                -I "pigz -p $nproc_count -b 256" \
                -x \
                --record-size=1M \
                -f "$shm_path" \
                -C "$target_dir" \
                --strip-components=1 \
                --no-same-owner; then

                echo "Success: $repo_name synced into $target_dir"
                rm -f "$shm_path"
                return 0
              fi
            fi

            echo "Attempt $attempt failed, clearing temporary files and retrying..."
            rm -rf "$target_dir" "$shm_path" 2>/dev/null || true
            sleep 5
            attempt=$((attempt + 1))
          done

          echo "::error::All attempts failed for $url"
          return 1
        }

        retry_clone() {
          local url="$1"
          local branch="${2:-main}"
          local depth="${3:-1}"
          local dir
          dir="$(basename "$url" .git)"

          local max_attempts=3
          local attempt=1

          local clone_args=(--branch "$branch")

          if [ "$depth" != "0" ] && [ -n "$depth" ]; then
            clone_args+=(--depth "$depth")
          fi

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Attempt $attempt/$max_attempts: cloning $url ($branch)${depth:+ [depth=$depth]}"

            rm -rf "$dir"

            if git clone "${clone_args[@]}" "$url" "$dir"; then
              echo "Success: $url cloned into $dir"
              return 0
            fi

            echo "Clone failed, cleaning up..."
            rm -rf "$dir" 2>/dev/null || true
            sleep $((attempt * 5))
            attempt=$((attempt + 1))
          done

          echo "::error::All clone attempts failed for $url"
          return 1
        }

        retry_clone_to_dir() {
          local url="$1"
          local branch="${2:-main}"
          local depth="${3:-1}"
          local dir="$4"

          local max_attempts=3
          local attempt=1

          local clone_args=(--branch "$branch")

          if [ "$depth" != "0" ] && [ -n "$depth" ]; then
            clone_args+=(--depth "$depth")
          fi

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Attempt $attempt/$max_attempts: cloning $url ($branch) into $dir"

            rm -rf "$dir"

            if git clone "${clone_args[@]}" "$url" "$dir"; then
              echo "Success: $url cloned into $dir"
              return 0
            fi

            echo "Clone failed, cleaning up..."
            rm -rf "$dir" 2>/dev/null || true
            sleep $((attempt * 5))
            attempt=$((attempt + 1))
          done

          echo "::error::All clone attempts failed for $url"
          return 1
        }

        retry_clone "https://github.com/WildKernels/kernel_patches.git" "main" "1"

        if [ "${{ inputs.enable_adios }}" = "true" ]; then
          retry_clone_to_dir "https://github.com/Bouteillepleine/kernel_patches.git" "main" "1" "bouton_kernel_patches"
          echo "ADIOS_PATCHES_FOLDER=$GITHUB_WORKSPACE/bouton_kernel_patches/experimental" >> "$GITHUB_ENV"
          echo "ADIOS patches cloned from Bouteillepleine/kernel_patches experimental folder"
        fi

        if [ "${OP_SUSFS:-false}" = "true" ]; then
          echo "Using SUSFS branch/ref: $SUSFS_BRANCH"

          rm -rf "$SUSFS_FOLDER"

          if ! retry_fetch_archive "https://gitlab.com/simonpunk/susfs4ksu.git" "$SUSFS_BRANCH" "$SUSFS_FOLDER"; then
            echo "::error::Failed to fetch SUSFS archive after multiple attempts"
            exit 1
          fi

          if [ ! -d "$SUSFS_FOLDER/kernel_patches" ]; then
            echo "::error::SUSFS folder was not extracted correctly: $SUSFS_FOLDER"
            echo "Workspace contents:"
            find "$GITHUB_WORKSPACE" -maxdepth 2 -type d -print || true
            exit 1
          fi

          {
            echo "SUSFS_REF=$SUSFS_BRANCH"
            echo "SUSFS_COMMIT_SHA=unknown"
          } >> "$GITHUB_ENV"
        fi

        echo "Dependencies cloned"
        echo "::endgroup::"

    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        echo "::group::Clean Up ABI Protected Exports"
        set -euo pipefail

        cd "$KERNEL_PLATFORM_FOLDER"

        rm -f common/android/abi_gki_protected_exports_* || true
        sed -i 's/protected_modules = \[.*\]/protected_modules = []/' common/modules.bzl || true

        echo "::endgroup::"

    - name: Add SukiSU Ultra
      shell: bash
      if: ${{ inputs.ksu_type == 'SUKISU' }}
      run: |
        set -euo pipefail
        echo "::group::Add SukiSU Ultra"

        cd "$KERNEL_PLATFORM_FOLDER"

        KSU_INPUT="${{ inputs.ksu_branch_or_hash }}"

        if [ -z "$KSU_INPUT" ]; then
          echo "No SukiSU branch/hash provided. Using builtin installer mode."

          curl --fail --location --proto '=https' -LSs \
            "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin
        else
          echo "Using SukiSU branch/hash: $KSU_INPUT"

          curl --fail --location --proto '=https' -LSs \
            "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s "$KSU_INPUT"
        fi

        if [ ! -d "$KERNEL_PLATFORM_FOLDER/KernelSU" ]; then
          echo "::error::KernelSU directory was not created by SukiSU setup."
          find "$KERNEL_PLATFORM_FOLDER" -maxdepth 3 -type d \( -iname "*ksu*" -o -iname "*suki*" \) || true
          exit 1
        fi

        cd "$KERNEL_PLATFORM_FOLDER/KernelSU"

        KSU_COMMIT_SHA="$(git rev-parse HEAD 2>/dev/null || echo unknown)"
        COMMITS_COUNT="$(git rev-list --count HEAD 2>/dev/null || echo 30000)"
        KSU_VERSION=$((COMMITS_COUNT + 37185))

        TAG_NAME="$(git describe --tags --abbrev=0 2>/dev/null || echo v4.1.3)"
        KSU_FULL_NAME="${TAG_NAME}-⚡Ultra⚡@SukiSU"

        echo "Detected SukiSU commits: $COMMITS_COUNT"
        echo "Calculated SukiSU Ultra version: $KSU_VERSION"
        echo "SukiSU Ultra commit: $KSU_COMMIT_SHA"
        echo "SukiSU full name: $KSU_FULL_NAME"

        if [ -f "$KERNEL_PLATFORM_FOLDER/KernelSU/kernel/Makefile" ]; then
          sed -i "s/DKSU_VERSION=[0-9]*/DKSU_VERSION=${KSU_VERSION}/" "$KERNEL_PLATFORM_FOLDER/KernelSU/kernel/Makefile" || true
          sed -i "s/DKSU_VERSION=12800/DKSU_VERSION=${KSU_VERSION}/" "$KERNEL_PLATFORM_FOLDER/KernelSU/kernel/Makefile" || true
          sed -i "s/DKSU_VERSION=11998/DKSU_VERSION=${KSU_VERSION}/" "$KERNEL_PLATFORM_FOLDER/KernelSU/kernel/Makefile" || true
          sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" "$KERNEL_PLATFORM_FOLDER/KernelSU/kernel/Makefile" || true
        fi

        # Avoid detached-HEAD naming where possible.
        # Some SukiSU revisions derive the display name from Git branch metadata.
        git checkout -B SukiSU "$KSU_COMMIT_SHA" 2>/dev/null || true

        {
          echo "KSU_COMMIT_SHA=$KSU_COMMIT_SHA"
          echo "KSUVER=$KSU_VERSION"
          echo "KSU_FULL_NAME=$KSU_FULL_NAME"
          echo "NEED_HOOKS=false"
        } >> "$GITHUB_ENV"

        DEFCONFIG="$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig"

        mkdir -p "$(dirname "$DEFCONFIG")"
        touch "$DEFCONFIG"

        sed -i \
          -e '/^CONFIG_KSU=/d' \
          -e '/^CONFIG_KPM=/d' \
          -e '/^CONFIG_KSU_MULTI_MANAGER_SUPPORT=/d' \
          -e '/^CONFIG_KSU_FULL_NAME_FORMAT=/d' \
          "$DEFCONFIG" || true

        {
          printf '%s\n' 'CONFIG_KSU=y'
          printf '%s\n' 'CONFIG_KPM=n'
          printf '%s\n' 'CONFIG_KSU_MULTI_MANAGER_SUPPORT=y'
          printf '%s\n' 'CONFIG_KSU_FULL_NAME_FORMAT="%TAG_NAME%-⚡Ultra⚡@SukiSU"'
        } >> "$DEFCONFIG"

        echo "SukiSU defconfig entries:"
        grep -nE 'CONFIG_KSU=|CONFIG_KPM=|CONFIG_KSU_MULTI_MANAGER_SUPPORT=|CONFIG_KSU_FULL_NAME_FORMAT=' "$DEFCONFIG" || true

        {
          echo "SUKISU"
          echo "$KSU_VERSION"
          echo "$KSU_FULL_NAME"
        } >> "${ARTIFACTS_FOLDER}/${OP_MODEL}_${OP_OS_VERSION}.txt"

        echo "✅ SukiSU Ultra added commit: ${KSU_COMMIT_SHA:0:8}"
        echo "::endgroup::"

    - name: Fix SukiSU Ultra header layout for 6.12
      shell: bash
      if: ${{ inputs.ksu_type == 'SUKISU' }}
      run: |
        set -euo pipefail
        echo "::group::Fix SukiSU Ultra header layout for 6.12"

        KSU_DRIVER_DIR="$COMMON_KERNEL_FOLDER/drivers/kernelsu"

        if [ ! -d "$KSU_DRIVER_DIR" ]; then
          echo "::warning::drivers/kernelsu not found at expected path: $KSU_DRIVER_DIR"
          echo "Searching for kernelsu driver directory..."

          FOUND_KSU_DRIVER_DIR="$(
            find "$COMMON_KERNEL_FOLDER" "$KERNEL_PLATFORM_FOLDER" \
              -type d \
              -path '*/drivers/kernelsu' \
              -print \
              -quit 2>/dev/null || true
          )"

          if [ -n "$FOUND_KSU_DRIVER_DIR" ]; then
            KSU_DRIVER_DIR="$FOUND_KSU_DRIVER_DIR"
          fi
        fi

        if [ ! -d "$KSU_DRIVER_DIR" ]; then
          echo "::error::Unable to locate drivers/kernelsu directory"
          find "$KERNEL_PLATFORM_FOLDER" -maxdepth 5 -type d \( -iname '*kernelsu*' -o -iname '*ksu*' \) -print || true
          exit 1
        fi

        echo "Using KSU driver directory: $KSU_DRIVER_DIR"

        find_header() {
          local name="$1"

          find "$KERNEL_PLATFORM_FOLDER/KernelSU" "$KSU_DRIVER_DIR" \
            -type f \
            -name "$name" \
            -print \
            -quit 2>/dev/null || true
        }

        copy_header_to_dir() {
          local header="$1"
          local dest_dir="$2"

          local src
          local dest
          local src_real
          local dest_real

          src="$(find_header "$header")"
          dest="$dest_dir/$header"

          if [ -z "$src" ]; then
            echo "::warning::Header not found in SukiSU tree: $header"
            return 0
          fi

          mkdir -p "$dest_dir"

          src_real="$(readlink -f "$src" 2>/dev/null || printf '%s' "$src")"
          dest_real="$(readlink -f "$dest" 2>/dev/null || printf '%s' "$dest")"

          if [ "$src_real" = "$dest_real" ]; then
            echo "Header already in place or same inode: $dest"
            return 0
          fi

          if [ -f "$dest" ] && cmp -s "$src" "$dest"; then
            echo "Header already identical: $dest"
            return 0
          fi

          if cp -f "$src" "$dest"; then
            echo "Copied $header -> $dest_dir/"
          else
            echo "::warning::Failed to copy $header from $src to $dest, continuing"
            return 0
          fi
        }

        common_headers=(
          klog.h
          arch.h
          feature.h
          util.h
          selinux.h
          supercall.h
          app_profile.h
          allowlist.h
          kernel_compat.h
        )

        for h in "${common_headers[@]}"; do
          copy_header_to_dir "$h" "$KSU_DRIVER_DIR"
          copy_header_to_dir "$h" "$KSU_DRIVER_DIR/core"
          copy_header_to_dir "$h" "$KSU_DRIVER_DIR/feature"
          copy_header_to_dir "$h" "$KSU_DRIVER_DIR/policy"
        done

        # allowlist.h includes "uapi/app_profile.h".
        # Quoted include from policy/allowlist.h first searches policy/uapi/.
        copy_header_to_dir "app_profile.h" "$KSU_DRIVER_DIR/policy/uapi"

        # Also place it in drivers/kernelsu/uapi for include paths that resolve from driver root.
        copy_header_to_dir "app_profile.h" "$KSU_DRIVER_DIR/uapi"

        # Some trees keep generated/internal headers under include/uapi-like paths.
        mkdir -p "$KSU_DRIVER_DIR/include/uapi" "$KSU_DRIVER_DIR/include/linux"
        copy_header_to_dir "app_profile.h" "$KSU_DRIVER_DIR/include/uapi"
        copy_header_to_dir "klog.h" "$KSU_DRIVER_DIR/include/linux"
        copy_header_to_dir "arch.h" "$KSU_DRIVER_DIR/include/linux"

        echo ""
        echo "Final SukiSU header check:"

        required_headers=(
          "$KSU_DRIVER_DIR/feature/klog.h"
          "$KSU_DRIVER_DIR/feature/arch.h"
          "$KSU_DRIVER_DIR/core/klog.h"
          "$KSU_DRIVER_DIR/core/arch.h"
          "$KSU_DRIVER_DIR/policy/uapi/app_profile.h"
          "$KSU_DRIVER_DIR/uapi/app_profile.h"
          "$KSU_DRIVER_DIR/klog.h"
          "$KSU_DRIVER_DIR/arch.h"
        )

        missing=0

        for h in "${required_headers[@]}"; do
          if [ -f "$h" ]; then
            echo "✅ $h"
          else
            echo "::warning::Still missing: $h"
            missing=1
          fi
        done

        echo ""
        echo "Nearby SukiSU headers:"
        find "$KSU_DRIVER_DIR" \
          -maxdepth 4 \
          -type f \
          \( \
            -name 'klog.h' \
            -o -name 'arch.h' \
            -o -name 'app_profile.h' \
            -o -name 'feature.h' \
            -o -name 'util.h' \
            -o -name 'selinux.h' \
            -o -name 'supercall.h' \
            -o -name 'allowlist.h' \
            -o -name 'kernel_compat.h' \
          \) \
          -print || true

        if [ "$missing" = 1 ]; then
          echo "::warning::Some expected SukiSU headers are still missing. Build may fail if this SukiSU commit changed its header layout."
        fi

        echo "✅ SukiSU Ultra header layout fix completed"
        echo "::endgroup::"

    - name: Apply Patches SukiSU Ultra
      shell: bash
      if: ${{ env.OP_SUSFS == 'true' }}
      env:
        FILE: ${{ env.OP_MANIFEST }}
      run: |
        set -euo pipefail
        echo "::group::Apply Patches SukiSU Ultra"

        cd "$CONFIG_FOLDER"

        if [ "${OP_SUSFS:-false}" = "true" ]; then
          if [ ! -d "$SUSFS_FOLDER/kernel_patches" ]; then
            echo "::error::SUSFS folder missing or invalid: $SUSFS_FOLDER"
            echo "Expected: $SUSFS_FOLDER/kernel_patches"
            echo "Workspace contents:"
            find "$GITHUB_WORKSPACE" -maxdepth 3 -type d -print || true
            exit 1
          fi

          SUSFS_COMMIT_SHA="$(
            git -C "$SUSFS_FOLDER" rev-parse HEAD 2>/dev/null || echo unknown
          )"

          {
            echo "SUSFS_REF=${SUSFS_REF:-${SUSFS_KERNEL_BRANCH:-unknown}}"
            echo "SUSFS_COMMIT_SHA=$SUSFS_COMMIT_SHA"
          } >> "$GITHUB_ENV"
        fi

        rm -rf SukiSU_patch
        git clone https://github.com/ShirkNeko/SukiSU_patch.git

        cd "$KERNEL_PLATFORM_FOLDER"

        if [ "${OP_SUSFS:-false}" = "true" ]; then
          echo "Fetching SUSFS patches"

          cp "$SUSFS_FOLDER/kernel_patches/50_add_susfs_in_gki-${ANDROID_VER}-${KERNEL_VER}.patch" "$COMMON_KERNEL_FOLDER/"

          if [ -d "$SUSFS_FOLDER/kernel_patches/fs" ]; then
            cp "$SUSFS_FOLDER/kernel_patches/fs/"* "$COMMON_KERNEL_FOLDER/fs/" || true
          fi

          if [ -d "$SUSFS_FOLDER/kernel_patches/include/linux" ]; then
            cp "$SUSFS_FOLDER/kernel_patches/include/linux/"* "$COMMON_KERNEL_FOLDER/include/linux/" || true
          fi
        fi
        
        cd "$COMMON_KERNEL_FOLDER"

        SUBLEVEL="$(grep '^SUBLEVEL *=' Makefile | head -n1 | cut -d= -f2 | tr -d ' ')"
        KMI="${ANDROID_VER}-${KERNEL_VER}"

        echo "Detected KMI: $KMI"
        echo "Detected SUBLEVEL: $SUBLEVEL"

        if [ "$KMI" = "android13-5.15" ] && [ "$SUBLEVEL" -lt 123 ]; then
          echo "Fixing bugs caused by kernel versions 5.15.0~5.15.123 only supporting the legacy C library"

          LEGACY_PATCH="$GITHUB_WORKSPACE/action-source/patches/fix_5.15.legacy"

          if [ -f "$LEGACY_PATCH" ]; then
            cp "$LEGACY_PATCH" ./fix_5.15.legacy.patch
            patch -p1 < fix_5.15.legacy.patch
            echo "fix_5.15_patch completed"
          else
            echo "::warning::Legacy 5.15 patch not found: $LEGACY_PATCH"
          fi
        fi

        if [[ "${KERNEL_VER}" == "6.6" && "${TKERNEL_VER##*.}" -le 30 && "${OP_SUSFS:-false}" = "true" ]]; then
          TRUSTY_EXISTS="false"

          if [ -f "$GITHUB_WORKSPACE/.repo/manifests_fallback/${FILE}" ] && grep -q 'common-modules/trusty' "$GITHUB_WORKSPACE/.repo/manifests_fallback/${FILE}"; then
            TRUSTY_EXISTS="true"
          elif [ -f "$GITHUB_WORKSPACE/.repo/manifests_fallback/${FILE}.xml" ] && grep -q 'common-modules/trusty' "$GITHUB_WORKSPACE/.repo/manifests_fallback/${FILE}.xml"; then
            TRUSTY_EXISTS="true"
          fi

          if [[ "$TRUSTY_EXISTS" == "false" ]]; then
            echo "Fixing SUSFS errors caused by missing TrustyOS in the source code and manifest for kernel versions 6.6.0~6.6.30"

            sed -i 's/-32,12 +32,38/-32,11 +32,37/g' "50_add_susfs_in_gki-${ANDROID_VER}-${KERNEL_VER}.patch" || true
            sed -i '/#include <trace\/hooks\/fs.h>/d' "50_add_susfs_in_gki-${ANDROID_VER}-${KERNEL_VER}.patch" || true
          fi
        fi

        if [ "${OP_SUSFS:-false}" = "true" ]; then
          fake_patched=0
          fake_patched_dist=0
          fake_patched_swap=0
          fake_patched_ns=0
          fake_patched_expand=0

          if [ "$KMI" = "android15-6.6" ]; then
            if [ -f "./fs/proc/task_mmu.c" ] && ! grep -qxF $'\tunsigned int nr_subpages = __PAGE_SIZE / PAGE_SIZE;' ./fs/proc/task_mmu.c; then
              echo "nr_subpages not found, applying patch fix"

              sed -i \
                -e '/int ret = 0, copied = 0;/a \\tunsigned int nr_subpages \= __PAGE_SIZE \/ PAGE_SIZE;' \
                -e '/int ret = 0, copied = 0;/a \\tpagemap_entry_t \*res = NULL;' \
                ./fs/proc/task_mmu.c

              fake_patched=1
            fi

            if [ -f "./fs/proc/base.c" ] && ! grep -qxF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
              echo "#include <linux/dma-buf.h> not found, adding missing header file"
              sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' ./fs/proc/base.c
            fi

            if [ -f "./mm/memory.c" ] && ! grep -qxF '#include <linux/zswap.h>' ./mm/memory.c; then
              echo "#include <linux/zswap.h> not found, adding missing header file"
              sed -i '/#include <linux\/sched\/sysctl\.h>/a #include <linux\/zswap.h>' ./mm/memory.c
              fake_patched_swap=1
            fi

            if [ -f "./fs/namespace.c" ] && ! grep -qxF '#include <trace/hooks/fs.h>' ./fs/namespace.c && ! grep -qxF 'susfs_def.h' ./fs/namespace.c; then
              echo "#include <trace/hooks/fs.h> not found, adding missing header file"
              sed -i '/#include <trace\/hooks\/blk\.h>/a #include <trace\/hooks\/fs.h>' ./fs/namespace.c
              fake_patched_ns=1
            fi

            if [ -f "./fs/proc/task_mmu.c" ] && grep -qF 'if (vma->vm_end > last_vma_end)' ./fs/proc/task_mmu.c && ! grep -qF 'if (vma->vm_end > last_vma_end) {' ./fs/proc/task_mmu.c; then
              echo "Temporarily expanding the last_vma_end if block to fix matching issues"

              perl -i -0pe 's/\t\t\tif \(vma->vm_end > last_vma_end\)\n\t\t\t\tsmap_gather_stats\(vma, &mss, last_vma_end\);/\t\t\tif (vma->vm_end > last_vma_end) {\n\t\t\t\tsmap_gather_stats(vma, \&mss, last_vma_end);\n\t\t\t\tlast_vma_end = vma->vm_end;\n\t\t\t}/' ./fs/proc/task_mmu.c

              fake_patched_expand=1
            fi
          fi

          if [ "$KMI" = "android14-6.1" ]; then
            if [ -f "./fs/proc/task_mmu.c" ] && ! grep -qxF $'\tif (!vma_pages(vma))' ./fs/proc/task_mmu.c; then
              echo "vma_pages not found, applying patch fix"
              fake_patched=1
            fi

            if [ -f "./fs/proc/base.c" ] && ! grep -qxF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
              echo "#include <linux/dma-buf.h> not found, adding missing header file"
              sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' ./fs/proc/base.c
            fi
          fi

          if [ "$KMI" = "android12-5.10" ] || [ "$KMI" = "android13-5.15" ]; then
            if [ -f "./fs/proc/task_mmu.c" ] && ! grep -qxF $'\tif (!vma_pages(vma))' ./fs/proc/task_mmu.c; then
              echo "vma_pages not found, applying patch fix"
              fake_patched=1
            fi
          fi

          if [ "$KMI" = "android13-5.15" ]; then
            if [ -f "./mm/memory.c" ] && grep -qxF '#include <linux/swap_slots.h>' ./mm/memory.c && ! grep -qxF '#include <linux/susfs_def.h>' ./mm/memory.c; then
              echo "Found swap_slots.h interfering with detection, temporarily removing it"
              sed -i '/#include <linux\/swap_slots\.h>/d' ./mm/memory.c
              fake_patched_dist=1
            fi
          fi

          echo "Applying SUSFS patch"

          SUSFS_PATCH="50_add_susfs_in_gki-${ANDROID_VER}-${KERNEL_VER}.patch"

          if [ ! -f "$SUSFS_PATCH" ]; then
            echo "::error::SUSFS patch not found: $COMMON_KERNEL_FOLDER/$SUSFS_PATCH"
            echo "Available patches:"
            find "$COMMON_KERNEL_FOLDER" -maxdepth 1 -type f -name '*.patch' -print || true
            exit 1
          fi

          patch -p1 < "$SUSFS_PATCH" || true

          echo "susfs_patch completed"

          if [ "$fake_patched" = 1 ]; then
            if [ "$KMI" = "android15-6.6" ]; then
              if [ -f "./fs/proc/task_mmu.c" ] && grep -qxF $'\tunsigned int nr_subpages = __PAGE_SIZE / PAGE_SIZE;' ./fs/proc/task_mmu.c; then
                sed -i \
                  -e '/unsigned int nr_subpages \= __PAGE_SIZE \/ PAGE_SIZE;/d' \
                  -e '/pagemap_entry_t \*res = NULL;/d' \
                  ./fs/proc/task_mmu.c
              fi
            fi

            if [ "$KMI" = "android12-5.10" ] || [ "$KMI" = "android13-5.15" ] || [ "$KMI" = "android14-6.1" ]; then
              if [ -f "./fs/proc/task_mmu.c" ] && grep -q 'goto[[:space:]]\+show_pad;' ./fs/proc/task_mmu.c; then
                sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
              fi
            fi
          fi

          if [ "$fake_patched_dist" = 1 ]; then
            if [ "$KMI" = "android13-5.15" ]; then
              if [ -f "./mm/memory.c" ] && ! grep -qxF '#include <linux/swap_slots.h>' ./mm/memory.c; then
                sed -i '/#ifdef CONFIG_KSU_SUSFS_SUS_MAP/i #include <linux/swap_slots.h>' ./mm/memory.c
              fi
            fi
          fi

          if [ "$fake_patched_swap" = 1 ]; then
            if [ "$KMI" = "android15-6.6" ]; then
              if [ -f "./mm/memory.c" ] && grep -qxF '#include <linux/zswap.h>' ./mm/memory.c; then
                sed -i '/#include <linux\/zswap\.h>/d' ./mm/memory.c
              fi
            fi
          fi

          if [ "$fake_patched_ns" = 1 ]; then
            if [ -f "./fs/namespace.c" ] && grep -qxF '#include <trace/hooks/fs.h>' ./fs/namespace.c && ! grep -qxF 'susfs_def.h' ./fs/namespace.c; then
              sed -i '/#include <trace\/hooks\/fs\.h>/d' ./fs/namespace.c
            fi
          fi

          if [ "$fake_patched_expand" = 1 ]; then
            if [ "$KMI" = "android15-6.6" ]; then
              if [ -f "./fs/proc/task_mmu.c" ] && grep -qF 'if (vma->vm_end > last_vma_end) {' ./fs/proc/task_mmu.c; then
                perl -i -0pe 's/\t\t\tif \(vma->vm_end > last_vma_end\) \{\n\t\t\t\tsmap_gather_stats\(vma, &mss, last_vma_end\);\n\t\t\t\tlast_vma_end = vma->vm_end;\n\t\t\t\}/\t\t\tif (vma->vm_end > last_vma_end)\n\t\t\t\tsmap_gather_stats(vma, \&mss, last_vma_end);/' ./fs/proc/task_mmu.c
              fi
            fi
          fi
        fi

        echo "Checking for reject files"

        REJECT_FILES="$(find "$COMMON_KERNEL_FOLDER" -name '*.rej' -print || true)"

        if [ -n "$REJECT_FILES" ]; then
          echo "::error::Reject files found after SUSFS patching:"
          while IFS= read -r rej; do
            echo "::group::Reject file: $rej"
            cat "$rej"
            echo "::endgroup::"
          done <<< "$REJECT_FILES"
          exit 1
        fi

        echo "Enabling SUSFS defconfig options"

        DEFCONFIG="$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig"

        mkdir -p "$(dirname "$DEFCONFIG")"
        touch "$DEFCONFIG"

        set_config() {
          local key="$1"
          local val="$2"
          local line="${key}=${val}"

          if grep -qE "^${key}=|^# ${key} is not set" "$DEFCONFIG"; then
            sed -i -E "s|^${key}=.*|${line}|; s|^# ${key} is not set|${line}|" "$DEFCONFIG"
          else
            printf '%s\n' "$line" >> "$DEFCONFIG"
          fi
        }

        set_config CONFIG_KSU_SUSFS y
        set_config CONFIG_KSU_SUSFS_SUS_PATH y
        set_config CONFIG_KSU_SUSFS_SUS_MOUNT y
        set_config CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT y
        set_config CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT y
        set_config CONFIG_KSU_SUSFS_SUS_KSTAT y
        set_config CONFIG_KSU_SUSFS_SUS_OVERLAYFS n
        set_config CONFIG_KSU_SUSFS_TRY_UMOUNT y
        set_config CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT y
        set_config CONFIG_KSU_SUSFS_SPOOF_UNAME y
        set_config CONFIG_KSU_SUSFS_ENABLE_LOG y
        set_config CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS y
        set_config CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG y
        set_config CONFIG_KSU_SUSFS_OPEN_REDIRECT y

        echo "SUSFS defconfig entries:"
        grep -nE '^CONFIG_KSU_SUSFS' "$DEFCONFIG" || true

        SUSVER="unknown"

        for f in \
          "$COMMON_KERNEL_FOLDER/include/linux/susfs.h" \
          "$COMMON_KERNEL_FOLDER/include/linux/susfs_def.h" \
          "$SUSFS_FOLDER/kernel_patches/include/linux/susfs.h" \
          "$SUSFS_FOLDER/kernel_patches/include/linux/susfs_def.h"; do

          if [ -f "$f" ]; then
            found="$(
              grep -E 'SUSFS_VERSION|SUSFS_VERSION_STR|SUSFS_VER' "$f" 2>/dev/null \
                | grep -Eo '"[^"]+"' \
                | head -n1 \
                | tr -d '"' \
                || true
            )"

            if [ -n "$found" ]; then
              SUSVER="$found"
              break
            fi
          fi
        done

        echo "Detected SUSFS version: $SUSVER"
        echo "SUSVER=$SUSVER" >> "$GITHUB_ENV"

        if [ -f "${ARTIFACTS_FOLDER}/${OP_MODEL}_${OP_OS_VERSION}.txt" ]; then
          echo "$SUSVER" >> "${ARTIFACTS_FOLDER}/${OP_MODEL}_${OP_OS_VERSION}.txt"
        fi

        echo "✅ SukiSU Ultra patch step completed"
        echo "::endgroup::"
    
    - name: Add BBG
      if: ${{ env.OP_BBG == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Add BBG LSM"

        cd "$KERNEL_PLATFORM_FOLDER"

        if ! wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash -s main; then
          echo "::warning::BBG setup script failed, continuing anyway"
        fi

        echo "CONFIG_BBG=y" >> common/arch/arm64/configs/gki_defconfig
        sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' common/security/Kconfig

        echo "✅ BBG LSM added"
        echo "::endgroup::"  

    - name: Apply Other Patches
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Apply Other patches"

        cd "$COMMON_KERNEL_FOLDER"

        KERNEL_VERSION="$KERNEL_VER"
        MIN_VERSION="5.16"

        if [ "$(printf '%s\n' "$KERNEL_VERSION" "$MIN_VERSION" | sort -V | head -n1)" = "$KERNEL_VERSION" ]; then
          patch -p1 -F 3 < "$KERNEL_PATCHES_FOLDER/gki_ptrace.patch"
        else
          echo "Kernel >= $MIN_VERSION, skipping ptrace patch"
        fi

        if [ "$OP_HMBIRD" = "true" ]; then
          HMBIRD_MODEL="$(echo "$OP_MODEL" | sed 's/-[0-9]\+\.[0-9]\+\.[0-9]\+$//')"

          case "$OP_MODEL" in
            OP-ACE-5-ULTRA-6.6.50|OP-ACE-5-PRO-6.6.30|OP13-6.6.30|OP13-CPH-6.6.56)
              FENGCHI_DIR="$KERNEL_PATCHES_FOLDER/oneplus/hmbird/deprecated"
              ;;
            *)
              FENGCHI_DIR="$KERNEL_PATCHES_FOLDER/oneplus/hmbird"
              ;;
          esac

          dos2unix "$FENGCHI_DIR/fengchi_${HMBIRD_MODEL}_${OP_OS_VERSION}.patch"
          patch -p1 -F 3 < "$FENGCHI_DIR/fengchi_${HMBIRD_MODEL}_${OP_OS_VERSION}.patch"

          dos2unix "$KERNEL_PATCHES_FOLDER/oneplus/hmbird/overwriter.patch"
          patch -p1 -F 3 < "$KERNEL_PATCHES_FOLDER/oneplus/hmbird/overwriter.patch"

          chmod +x ./drivers/of/overwriter/overwrite_configs/convert_configs.sh || true

          dos2unix "$KERNEL_PATCHES_FOLDER/oneplus/hmbird/hmbird_config.patch"
          patch -p1 -F 3 < "$KERNEL_PATCHES_FOLDER/oneplus/hmbird/hmbird_config.patch"
        else
          echo "Hmbird not enabled, skipping fengchi patch"
        fi

        echo "✅ Other patches applied"
        echo "::endgroup::"

    - name: 🔧 Add ADIOS I/O Scheduler
      shell: bash
      if: ${{ inputs.enable_adios == true || inputs.enable_adios == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Add ADIOS I/O Scheduler"

        cd "$COMMON_KERNEL_FOLDER"

        echo "Starting ADIOS I/O scheduler support setup..."
        echo "Kernel base version: ${KERNEL_VER:-unknown}"
        echo "Kernel full version: ${TKERNEL_VER:-unknown}"
        echo "Android version: ${ANDROID_VER:-unknown}"
        echo "Model: ${OP_MODEL:-unknown}"
        echo "SoC: ${OP_SOC:-unknown}"
        echo "Branch: ${OP_BRANCH:-unknown}"

        if [ -z "${ADIOS_PATCHES_FOLDER:-}" ]; then
          echo "::error::ADIOS_PATCHES_FOLDER is not set"
          exit 1
        fi

        if [ ! -d "$ADIOS_PATCHES_FOLDER" ]; then
          echo "::error::ADIOS patches folder not found: $ADIOS_PATCHES_FOLDER"
          exit 1
        fi

        PATCH_FILE=""

        case "${KERNEL_VER}" in
          "6.6")
            PATCH_FILE="$ADIOS_PATCHES_FOLDER/adios_ioscheduler_6.6.patch"
            ;;
          "6.1")
            if [ "${TKERNEL_VER:-}" = "6.1.115" ] && { [[ "${OP_BRANCH:-}" == *mt* ]] || [[ "${OP_SOC:-}" == *dimensity* ]] || [[ "${OP_SOC:-}" == *mediatek* ]] || [[ "${OP_SOC:-}" == *mt* ]]; }; then
              PATCH_FILE="$ADIOS_PATCHES_FOLDER/adios_ioscheduler_6.1_mt6989.patch"
            elif [ "${TKERNEL_VER:-}" = "6.1.57" ] || [ "${TKERNEL_VER:-}" = "6.1.75" ]; then
              PATCH_FILE="$ADIOS_PATCHES_FOLDER/adios_ioscheduler_6.1_old.patch"
            else
              PATCH_FILE="$ADIOS_PATCHES_FOLDER/adios_ioscheduler_6.1.patch"
            fi
            ;;
          *)
            echo "::warning::ADIOS is only configured for kernel 6.1 and 6.6. Current kernel: ${KERNEL_VER}"
            echo "::endgroup::"
            exit 0
            ;;
        esac

        echo "Using ADIOS patch: $PATCH_FILE"

        if [ ! -f "$PATCH_FILE" ]; then
          echo "::error::ADIOS I/O scheduler patch file not found: $PATCH_FILE"
          echo "Available ADIOS-related files:"
          find "$ADIOS_PATCHES_FOLDER" -maxdepth 3 -type f -iname "*adios*" -print || true
          exit 1
        fi

        if [ -f "block/adios.c" ]; then
          echo "ADIOS I/O scheduler source file already exists. Skipping patch application."
        else
          cp "$PATCH_FILE" ./adios.patch
          echo "Applying ADIOS I/O scheduler patch..."

          if patch -p1 --ignore-whitespace -F 3 < adios.patch 2>&1 | tee /tmp/adios_patch.log; then
            echo "ADIOS I/O scheduler patch applied successfully"
          else
            echo "::warning::ADIOS patch application reported an issue"

            if grep -q "malformed patch" /tmp/adios_patch.log; then
              echo "::warning::Malformed patch detected. Retrying with --force."
              patch -p1 --force --ignore-whitespace < adios.patch || true
            fi

            if find . -name "*.rej" -print -quit | grep -q .; then
              echo "::error::ADIOS patch failed. Reject files found:"
              find . -name "*.rej" -exec echo "=== {} ===" \; -exec cat {} \;
              exit 1
            fi
          fi

          rm -f adios.patch
        fi

        DEFCONFIG="$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig"

        if [ ! -f "$DEFCONFIG" ]; then
          echo "::error::gki_defconfig not found: $DEFCONFIG"
          exit 1
        fi

        if ! grep -q "^CONFIG_MQ_IOSCHED_ADIOS=" "$DEFCONFIG"; then
          {
            echo "CONFIG_MQ_IOSCHED_ADIOS=y"
            echo "CONFIG_MQ_IOSCHED_DEFAULT_ADIOS=y"
          } >> "$DEFCONFIG"

          echo "ADIOS I/O scheduler support enabled"
        else
          echo "ADIOS config already exists in gki_defconfig"
        fi

        echo "ADIOS I/O scheduler setup completed"
        echo "::endgroup::"

    - name: Apply NTSync Patch
      shell: bash
      if: ${{ env.OP_NTSYNC == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Apply NTSync patch"

        cd "$COMMON_KERNEL_FOLDER"

        NTSYNC_FOLDER="$KERNEL_PATCHES_FOLDER/common/ntsync"
        GKI_KEY="${ANDROID_VER}-${KERNEL_VER}"
        NTSYNC_PATCH=""

        case "$OP_MODEL" in
          OP10r|OP-ACE-2-5.10.209|OP-ACE-2V-5.10.209|OP-PAD-MT6983-5.10.209|OP10pro-5.10.209|OP10t-5.10.209|OP-ACE-5.10.209|OP11r-5.10.209|OP-NORD-3-5.10.209|OP-ACE-RACE-5.10.209)
            if [[ "$OP_OS_VERSION" == "OOS15" ]]; then
              NTSYNC_PATCH="$NTSYNC_FOLDER/ntsync_compat_android12-5.10_OOS14.patch"
            fi
            ;;
        esac

        if [ -n "$NTSYNC_PATCH" ]; then
          if [ ! -f "$NTSYNC_PATCH" ]; then
            echo "::error::NTSync compat patch not found for ${OP_MODEL}: $(basename "$NTSYNC_PATCH")"
            exit 1
          fi
        elif [ -f "$NTSYNC_FOLDER/ntsync_compat_${GKI_KEY}_${OP_OS_VERSION}.patch" ]; then
          NTSYNC_PATCH="$NTSYNC_FOLDER/ntsync_compat_${GKI_KEY}_${OP_OS_VERSION}.patch"
        elif [ -f "$NTSYNC_FOLDER/ntsync_compat_${GKI_KEY}.patch" ]; then
          NTSYNC_PATCH="$NTSYNC_FOLDER/ntsync_compat_${GKI_KEY}.patch"
        else
          echo "::error::NTSync patch not found for ${GKI_KEY} / ${OP_MODEL} / ${OP_OS_VERSION}"
          exit 1
        fi

        if [ "$ANDROID_VER" = "android16" ] && [ "$KERNEL_VER" = "6.12" ]; then
          rm -f include/uapi/linux/ntsync.h drivers/misc/ntsync.c
        fi

        patch -p1 --forward < "$NTSYNC_PATCH"
        patch -p1 --forward < "$NTSYNC_FOLDER/ntsync_base.patch"

        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" <<EOF
        CONFIG_NTSYNC=y
        EOF

        echo "✅ NTSync patch applied"
        echo "::endgroup::"

