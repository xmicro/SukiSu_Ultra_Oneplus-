name: 'Restore Cache'

inputs:
  cache_path:
    description: 'Path where cache should be restored'
    required: true
    type: string
  cache_key:
    description: 'Primary key to restore cache'
    required: true
    type: string
  restore_keys:
    description: 'Multiline list of keys (fallback prefixes)'
    required: false
    type: string
    default: ""
  cache_bucket:
    description: 'The tag name for the release (e.g., general-cache)'
    required: true
    default: 'general-cache'
  debug:
    description: 'Enable Logs'
    required: false
    type: boolean
    default: false

runs:
  using: 'composite'
  steps:
    - name: Detect and Download Cache
      shell: bash
      env:
        TARGET_REPO: "${{ github.repository }}"
      run: |
        if [ "${{ inputs.debug }}" = "true" ]; then set -x; fi

        cd "$GITHUB_WORKSPACE"

        TAG_NAME="${{ inputs.cache_bucket }}"
        BASE_URL="https://github.com/${TARGET_REPO}/releases/download/$TAG_NAME"
        ASSETS_URL="https://github.com/${TARGET_REPO}/releases/expanded_assets/$TAG_NAME"

        ARIA2_OPTS=(
          "-x16" "-s16" "-k1M" "-j5" "--file-allocation=none"
          "--header=User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          "--header=Accept: */*"
          "--header=Connection: keep-alive"
        )

        if [ "${{ inputs.debug }}" != "true" ]; then
          ARIA2_OPTS+=("--quiet" "--summary-interval=0" "--console-log-level=error")
        fi

        # ──────────────────────────────────────────────
        # FETCH ASSET LIST
        # ──────────────────────────────────────────────
        echo "::group:: Fetching Asset List"

        HTTP_RESPONSE=$(curl -sL -A "Mozilla/5.0" -w "%{http_code}" "$ASSETS_URL" -o assets.html || echo "404")

        if [ "$HTTP_RESPONSE" -eq 200 ]; then
          ALL_ASSETS=$(grep -oP "download/$TAG_NAME/\K[^\"' ]+" assets.html | sort -u || echo "")
        else
          echo "Status $HTTP_RESPONSE: Failed to fetch assets from scraper endpoint."
          ALL_ASSETS=""
        fi
        rm -f assets.html

        if [ -z "$ALL_ASSETS" ]; then
          echo "No assets found in bucket '$TAG_NAME'. Skipping search."
          echo "::endgroup::"
          exit 0
        fi

        echo "Successfully fetched asset list. Has $(echo "$ALL_ASSETS" | wc -l) assets."
        echo "::endgroup::"

        # ──────────────────────────────────────────────
        # SEARCH
        # ──────────────────────────────────────────────
        SEARCH_LIST=$(printf "%s\n%s" "${{ inputs.cache_key }}" "${{ inputs.restore_keys }}" | sed '/^$/d')

        FOUND=false

        while read -r KEY; do
          [ -z "$KEY" ] && continue
          echo "::group:: Searching Prefix: $KEY"

          MATCH=$(echo "$ALL_ASSETS" | grep "^cache-$KEY" | sort -r | head -n 1 || true)

          if [ -z "$MATCH" ]; then
            echo "Not found."
            echo "::endgroup::"
            continue
          fi

          # ✅ Extraction robuste des métadonnées
          BASE_FILENAME=$(echo "$MATCH" | sed -E 's/\.(tzst|tar)(\.part[a-z]{2})?$//')
          EXT=$(echo "$MATCH" | grep -oP '\.(tzst|tar)' | head -n 1)

          [[ "$MATCH" == *".part"* ]] && IS_SPLIT=true  || IS_SPLIT=false
          [ "$EXT" = ".tzst" ]        && COMPRESSED=true || COMPRESSED=false
          FOUND=true

          echo "✅ Hit! Restoring $BASE_FILENAME$EXT"
          echo "   Split:      $IS_SPLIT"
          echo "   Compressed: $COMPRESSED"
          echo "::endgroup::"

          # ──────────────────────────────────────────────
          # DOWNLOAD
          # ──────────────────────────────────────────────
          echo "::group:: Downloading Cache"

          download_asset() {
            local filename="$1"
            local url="$2"
            local max_retries=3
            local attempt=1

            while [ "$attempt" -le "$max_retries" ]; do
              echo "  Attempt $attempt: Downloading $filename..."

              if timeout 10m aria2c "${ARIA2_OPTS[@]}" \
                  --retry-wait=10 --max-tries=10 \
                  -o "$filename" "$url"; then

                # ✅ FIX — vérifier la taille après téléchargement
                local dl_size
                dl_size="$(stat -c%s "$filename" 2>/dev/null || echo 0)"
                if [ "$dl_size" -lt 1024 ]; then
                  echo "  ⚠️ Downloaded file suspiciously small (${dl_size} bytes). Retrying..."
                  rm -f "$filename"
                else
                  echo "  ✅ Downloaded: $filename ($(numfmt --to=iec-i --suffix=B "$dl_size"))"
                  return 0
                fi
              fi

              echo "  ⚠️ Download failed or timed out. Retrying in 5s..."
              sleep 5
              attempt=$((attempt + 1))
            done

            return 1
          }

          if [ "$IS_SPLIT" = "true" ]; then
            # ✅ FIX — télécharger uniquement les parts listées dans ALL_ASSETS
            for part in {a..z}{a..z}; do
              PART_NAME="$BASE_FILENAME$EXT.part${part}"
              if echo "$ALL_ASSETS" | grep -q "^${PART_NAME}$"; then
                if ! download_asset "$PART_NAME" "$BASE_URL/$PART_NAME"; then
                  echo "::error::Failed to download $PART_NAME after multiple retries."
                  exit 1
                fi
              else
                break
              fi
            done
          else
            if ! download_asset "$BASE_FILENAME$EXT" "$BASE_URL/$BASE_FILENAME$EXT"; then
              echo "::error::Failed to download $BASE_FILENAME$EXT after multiple retries."
              exit 1
            fi
          fi

          echo "::endgroup::"

          # ──────────────────────────────────────────────
          # EXTRACT
          # ──────────────────────────────────────────────
          echo "::group:: Extracting Cache"

          mkdir -p "${{ inputs.cache_path }}"
          FINAL_ARCHIVE="$BASE_FILENAME$EXT"
          EXTRACT_DIR="$(dirname "${{ inputs.cache_path }}")"

          extract_cache() {
            local cmd="$1"
            if [ "${{ inputs.debug }}" = "true" ]; then
              sh -c "$cmd"
            else
              # ✅ FIX — afficher les 5 dernières lignes en cas d'erreur
              sh -c "$cmd" 2>&1 | tail -n 5 || true
            fi
          }

          if [ "$IS_SPLIT" = "true" ]; then

            # ✅ FIX — collecter les parts dans un tableau trié,
            #          vérifier la taille de chaque part individuellement
            PARTS_LIST=()
            for part in {a..z}{a..z}; do
              PART_FILE="$FINAL_ARCHIVE.part${part}"
              if [ -f "$PART_FILE" ]; then
                PART_SIZE="$(stat -c%s "$PART_FILE" 2>/dev/null || echo 0)"
                if [ "$PART_SIZE" -lt 1024 ]; then
                  echo "::error::Part file suspiciously small (${PART_SIZE} bytes): $PART_FILE"
                  exit 1
                fi
                PARTS_LIST+=("$PART_FILE")
              else
                break
              fi
            done

            if [ "${#PARTS_LIST[@]}" -eq 0 ]; then
              echo "::error::No part files found matching $FINAL_ARCHIVE.part*"
              exit 1
            fi

            echo "Found ${#PARTS_LIST[@]} part(s):"
            for p in "${PARTS_LIST[@]}"; do
              echo "  $p ($(numfmt --to=iec-i --suffix=B "$(stat -c%s "$p")"))"
            done

            if [ "$COMPRESSED" = "true" ]; then
              # ✅ FIX — test d'intégrité zstd du flux assemblé (non bloquant)
              if ! cat "${PARTS_LIST[@]}" | zstd -d -T0 --test > /dev/null 2>&1; then
                echo "::warning::zstd stream integrity check failed — attempting extraction anyway"
              else
                echo "✅ zstd stream integrity check passed"
              fi
              # ✅ FIX — printf '%q' pour gérer les espaces dans les chemins
              extract_cache "cat $(printf '%q ' "${PARTS_LIST[@]}") | tar -I 'zstd -d -T0' -xf - -C $(printf '%q' "$EXTRACT_DIR")"
            else
              extract_cache "cat $(printf '%q ' "${PARTS_LIST[@]}") | tar -xf - -C $(printf '%q' "$EXTRACT_DIR")"
            fi

            # ✅ FIX — nettoyage explicite via le tableau (pas de glob nu)
            rm -f "${PARTS_LIST[@]}"

          else

            # ✅ FIX — vérifier la taille de l'archive avant extraction
            ARCHIVE_SIZE="$(stat -c%s "$FINAL_ARCHIVE" 2>/dev/null || echo 0)"
            if [ "$ARCHIVE_SIZE" -lt 1024 ]; then
              echo "::error::Archive file suspiciously small (${ARCHIVE_SIZE} bytes): $FINAL_ARCHIVE"
              exit 1
            fi
            echo "Archive size: $(numfmt --to=iec-i --suffix=B "$ARCHIVE_SIZE")"

            if [ "$COMPRESSED" = "true" ]; then
              # ✅ FIX — test d'intégrité zstd avant extraction (non bloquant)
              if ! zstd -d -T0 --test "$FINAL_ARCHIVE" > /dev/null 2>&1; then
                echo "::warning::zstd integrity check failed — attempting extraction anyway"
              else
                echo "✅ zstd integrity check passed"
              fi
              extract_cache "tar -I 'zstd -d -T0' -xf $(printf '%q' "$FINAL_ARCHIVE") -C $(printf '%q' "$EXTRACT_DIR")"
            else
              extract_cache "tar -xf $(printf '%q' "$FINAL_ARCHIVE") -C $(printf '%q' "$EXTRACT_DIR")"
            fi

            rm -f "$FINAL_ARCHIVE"
          fi

          # ✅ FIX — vérifier que l'extraction a produit des fichiers
          EXTRACTED_COUNT="$(find "${{ inputs.cache_path }}" -mindepth 1 -maxdepth 3 -type f 2>/dev/null | wc -l || echo 0)"
          if [ "$EXTRACTED_COUNT" -eq 0 ]; then
            echo "::warning::Extraction completed but no files found in ${{ inputs.cache_path }}"
          else
            echo "✅ Restore complete. ~${EXTRACTED_COUNT} file(s) in ${{ inputs.cache_path }}"
          fi

          echo "::endgroup::"
          break

        done <<< "$SEARCH_LIST"

        if [ "$FOUND" = "false" ]; then
          echo "⚠️ No cache matches found. Proceeding with fresh run."
        fi
