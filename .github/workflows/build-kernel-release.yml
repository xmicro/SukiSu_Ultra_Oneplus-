          ksu_display="$(ksu_display_value "$ksu_ref" "$ksu_resolved_hash")"

          cat > release_notes.md << EOF
          # ­čÄ» OnePlus Kernels with KernelSU Variants & SUSFS $SUSFS_BASE_VERSION

          > **Build Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')  
          > **Build ID:** \`${{ github.run_id }}\`  
          > **Workflow:** [\`${{ github.workflow }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ---

          ## ­čöž Build Configuration

          | Component | Version/Setting |
          |-----------|-----------------|
          | **Target Group** | \`$TARGET_GROUP\` |
          | **Target Model Filter** | \`$TARGET_MODEL_DISPLAY\` |
          | **Matrix Targets** | \`$MATRIX_COUNT\` |
          | **Release ZIP Assets** | \`$ZIP_COUNT\` |
          | **Root Variant** | \`$ksu_name\` |
          | **Root Repository** | \`$ksu_repo\` |
          | **Root Ref** | \`$ksu_display\` |
          | **Root Version** | \`$ksu_ver_global\` |
          | **Root Commit** | \`$ksu_resolved_hash\` |
          | **SUSFS Version** | \`$SUSFS_BASE_VERSION\` |
          | **Optimization Level** | \`$OPTIMIZE_LEVEL\` |
          | **Clean Build** | $( [ "$CLEAN_BUILD" = "true" ] && echo "Ôťů Yes (no ccache)" || echo "ÔŁî No (ccache enabled)" ) |
          | **Compiler** | Clang (version varies by device) |

          ---

          ## ­čôŽ Built Devices (${#device_info[@]} total)

          | Model | OS Version | Kernel Version | Root Variant | Features |
          |-------|------------|----------------|--------------|----------|
          EOF

          for full_key in $(printf '%s\n' "${!device_info[@]}" | sort); do
            IFS='|' read -r model os_ver kernel_ver zip_ksu_type _ _ <<< "${device_info[$full_key]}"

            feature_flags="$(jq -r --arg MODEL "$model" --arg OS "$os_ver" '
              .[]
              | select(.model == $MODEL and .os_version == $OS)
              | "\(.hmbird // false)\t\(.susfs // false)\t\(.bbr // false)\t\(.bbg // false)\t\(.ttl // false)\t\(.ip_set // false)\t\(.unicode // false)\t\(.ds // false)\t\(.ntsync // false)"
            ' <<< "$JSON_BUILD_DATA" | head -n1)"

            features=()

            if [ -z "$feature_flags" ]; then
              features_str="N/A"
            else
              IFS=$'\t' read -r hmbird susfs bbr bbg ttl ip_set unicode ds ntsync <<< "$feature_flags"

              [[ "$hmbird" == "true" ]] && features+=("­čÉŽ HMBIRD")
              [[ "$susfs" == "true" ]] && features+=("ÓÂ× SusFS")
              [[ "$bbr" == "true" ]] && features+=("­čÜÇ BBR")
              [[ "$bbg" == "true" ]] && features+=("­čŤí´ŞĆ BBG")
              [[ "$ttl" == "true" ]] && features+=("­čîÉ TTL")
              [[ "$ip_set" == "true" ]] && features+=("­čž▒ IP_SET & IPv6 NAT")
              [[ "$unicode" == "true" ]] && features+=("­čöž Unicode Fix")
              [[ "$ds" == "true" ]] && features+=("­čĺ╗ Droidspaces")
              [[ "$ntsync" == "true" ]] && features+=("­čöâ NTSync")

              if [ "${#features[@]}" -eq 0 ]; then
                features_str="N/A"
              else
                features_str="$(IFS=', '; echo "${features[*]}")"
              fi
            fi

            case "$zip_ksu_type" in
              KSUN)
                zip_ksu_label="KernelSU Next"
                ;;
              KSU)
                zip_ksu_label="KernelSU"
                ;;
              RSKSU)
                zip_ksu_label="ReSukiSU"
                ;;
              SUKISU)
                zip_ksu_label="SukiSU Ultra"
                ;;
              *)
                zip_ksu_label="$zip_ksu_type"
                ;;
            esac

            echo "| $model | $os_ver | $kernel_ver | $zip_ksu_label | $features_str |" >> release_notes.md
          done

          cat >> release_notes.md << EOF

          ---

          ## ­čôî SUSFS Branch Mapping

          | Kernel Version | SUSFS Commit |
          |----------------|--------------|
          EOF

          for key in "${active_gki_keys[@]}"; do
            [ -n "$key" ] || continue
            echo "| $key | \`${susfs_map[$key]:-unknown}\` |" >> release_notes.md
          done

          cat >> release_notes.md << EOF

          ---

          ## ­čôą Release Assets

          | Artifact |
          |----------|
          EOF

          while IFS= read -r file; do
            echo "| \`$(basename "$file")\` |" >> release_notes.md
          done < <(find ./downloaded-artifacts -type f -name "*.zip" | sort)

          cat >> release_notes.md << EOF

          ---

          ## ÔťĘ Features & Capabilities

          ### ­čöÉ Root Management

          - **$ksu_name** - Kernel-level root solution
          - **SUSFS $SUSFS_BASE_VERSION** - Advanced hiding and security features

          ### ­čŤí´ŞĆ Security & Privacy

          - **Baseband Guard (BBG)** - LSM-based baseband security
          - **SUSFS Hide Features**
            - SUS_PATH
            - SUS_MOUNT
            - SUS_KSTAT
            - SPOOF_UNAME
            - SPOOF_CMDLINE
            - OPEN_REDIRECT
            - SUS_MAP
          - **Ptrace Leak Fix** - For kernels below 5.16
          - **Unicode Fix** - Experimental Unicode bypass mitigation

          ### ­čÜÇ Performance & Networking

          - **BBRv1**
          - **WireGuard**
          - **IP Set & IPv6 NAT Support**
          - **TTL Target Support**
          - **LTO**
          - **ccache-accelerated builds**
          - **General optimisation patches**

          ### ­čöž System Features

          - **TMPFS_XATTR**
          - **TMPFS_POSIX_ACL**
          - **HMBIRD SCX**
          - **Droidspaces**
          - **NTSync**

          ---

          ## ­čô▒ Manager Applications

          ### Official / Compatible Manager

          - **$ksu_name Manager / Compatible Manager**  
            Ôćĺ $ksu_manager_url

          ### Community Managers

          - **WildKSU Manager**  
            Ôćĺ https://github.com/WildKernels/Wild_KSU/releases

          ### Required Module

          - **KSU SUSFS Module**  
            Ôćĺ https://github.com/sidex15/ksu_module_susfs/releases

          ### Recommended Flasher

          - **Kernel Flasher**  
            Ôćĺ https://github.com/fatalcoder524/KernelFlasher/releases

          ---

          ## ­čôą Installation Instructions

          ### Prerequisites

          - Unlocked bootloader.
          - Backup your current boot image.
          - Have root access using Magisk, KernelSU, APatch, or compatible forks.

          ### Via Kernel Flasher

          1. Download the correct AnyKernel3 ZIP for your device.
          2. If you previously used another root method, clean it up first:
             - **Magisk:** perform a complete uninstall after flashing the AnyKernel3 ZIP.
             - **KSU LKM:** flash back stock boot/init_boot/vendor_boot depending on what you patched.
             - **KSU GKI:** if stock boot/init_boot/vendor_boot is already restored, no action is needed.
             - **APatch:** remove incompatible leftovers from \`/data/adb\` after flashing.
          3. Flash the ZIP to the active slot using Kernel Flasher.
          4. Install the matching manager APK for the selected root variant.
          5. Open the installed manager app and verify root status.
          6. Reboot if you performed cleanup in step 2.

          ---

          ## ­čôť Changelog

          - Updated SUSFS to $SUSFS_BASE_VERSION.
          - Added or improved HMBIRD support.
          - Improved ccache build system.
          - Enhanced SUSFS hiding capabilities.
          - Added IP_SET, IPv6 NAT and TTL support.
          - Added TMPFS_XATTR and TMPFS_POSIX_ACL support.
          - Added ptrace leak fix for kernels below 5.16.
          - Compiler optimization: $OPTIMIZE_LEVEL.
          - Added Droidspaces support.
          - Added NTSync support.
          - Added ReSukiSU support through \`RSKSU\` builds.
          - Added SukiSU Ultra support through \`SUKISU\` builds.

          ---

          ## ÔÜá´ŞĆ Flashing Notice

          Flash only the ZIP intended for your exact device model and OS version.

