name: Build and Release OnePlus Kernels

run-name: >-
  ${{ github.event.inputs.op_target_model != '' && github.event.inputs.op_target_model || github.event.inputs.op_model }}
  ŌĆó SUKISU
  ŌĆó ${{ github.event.inputs.build_timestamp != '' && github.event.inputs.build_timestamp || 'auto timestamp' }}

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Do you want to create a release?'
        required: true
        type: boolean
        default: false

      op_model:
        description: 'Select the OnePlus kernels to build'
        required: true
        type: choice
        options:
          - OOS14+15+16
          - OOS15+16
          - OOS14+15
          - OOS16
          - OOS15
          - OOS14
          - android16-6.12
          - android15-6.6
          - android14-6.1
          - android13-5.15
          - android12-5.10
        default: OOS14+15+16

      op_target_model:
        description: 'Optional: build only one model, e.g. OP12, OP13-CPH, OP-NORD-4, OP12-6.1.118. Leave empty to build all selected.'
        required: false
        type: string
        default: ''

      ksu_options:
        description: 'Enter SukiSU Ultra build json'
        required: true
        type: string
        default: '[{"type":"sukisu","hash":"main"}]'

      optimize_level:
        description: "Compiler optimization level"
        required: true
        type: choice
        options:
          - O2
          - O3
        default: O2

      enable_adios:
          description: 'Enable ADIOS I/O scheduler support'
          required: false
          type: boolean
          default: false

      clean_build:
        description: 'Clean build (no ccache)'
        type: boolean
        default: false

      debug:
        description: 'Enable debug mode: dumping debug related artifacts and show some debug logs'
        required: false
        type: boolean
        default: false

      mirror_toolchains:
        description: 'Do you want to sync toolchains before build? [required for the 1st run]'
        required: false
        type: boolean
        default: false

      build_timestamp:
        description: 'Custom kernel build timestamp for uname -a, e.g. "Tue Feb 10 10:01:02 UTC 2026". Leave empty for current time.'
        type: string
        default: ''

      android12-5_10_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android12-5.10'
        type: string
        default: ''

      android13-5_15_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android13-5.15'
        type: string
        default: ''

      android14-6_1_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android14-6.1'
        type: string
        default: ''

      android15-6_6_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android15-6.6'
        type: string
        default: ''

      android16-6_12_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android16-6.12'
        type: string
        default: ''

jobs:
  set-op-model:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      device_count: ${{ steps.set-matrix.outputs.count }}
      active_gki_keys: ${{ steps.set-matrix.outputs.active_gki_keys }}
      susfs_hash_android12_5_10: ${{ steps.set-matrix.outputs.susfs_hash_android12_5_10 }}
      susfs_hash_android13_5_15: ${{ steps.set-matrix.outputs.susfs_hash_android13_5_15 }}
      susfs_hash_android14_6_1: ${{ steps.set-matrix.outputs.susfs_hash_android14_6_1 }}
      susfs_hash_android15_6_6: ${{ steps.set-matrix.outputs.susfs_hash_android15_6_6 }}
      susfs_hash_android16_6_12: ${{ steps.set-matrix.outputs.susfs_hash_android16_6_12 }}
      ksu_resolved_hash: ${{ steps.set-matrix.outputs.ksu_resolved_hash }}
      ksu_options_normalized: ${{ steps.set-matrix.outputs.ksu_options_normalized }}
      susfs_base_version: ${{ steps.set-matrix.outputs.susfs_base_version }}
    env:
      GH_TOKEN: ${{ github.token }}
      GH_HTTP_TIMEOUT: 600
    steps:
      - name: ­¤ōź Checkout Code (to access configs/)
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            configs/
          sparse-checkout-cone-mode: false

      - name: ­¤öŹ Generate build matrix
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Matrix generation"

          input="${{ github.event.inputs.op_model }}"
          target_model="${{ github.event.inputs.op_target_model }}"
          ksu_options_raw='${{ github.event.inputs.ksu_options }}'

          if ! ksu_options_normalized=$(echo "$ksu_options_raw" | jq -c '
            map(
              if .type then
                .type |= ascii_upcase
                | if .type != "SUKISU" then
                    error("Only SUKISU/SukiSU Ultra is supported. Got: " + .type)
                  else
                    .
                  end
                | if (.hash == null or .hash == "") then
                    .hash = "main"
                  else
                    .
                  end
              else
                error("No type found")
              end
            )
          ' 2>&1); then
            echo "::error::ksu_options validation failed: $ksu_options_normalized"
            exit 1
          fi

          echo "ksu_options_normalized=$ksu_options_normalized" >> "$GITHUB_OUTPUT"

          echo "[" > matrix.json
          mapfile -t all_json_files < <(find configs/ -name "*.json" -print0 | xargs -0 -n1)

          for i in "${!all_json_files[@]}"; do
            file="${all_json_files[$i]}"
            if [ -f "$file" ]; then
              jq -r '.' "$file" >> matrix.json
              if [ $((i + 1)) -lt ${#all_json_files[@]} ]; then
                echo "," >> matrix.json
              fi
            fi
          done

          echo "]" >> matrix.json

          jq_filter="."

          case "$input" in
            OOS14+15+16)
              ;;
            OOS15+16)
              jq_filter="map(select(.os_version == \"OOS15\" or .os_version == \"OOS16\"))"
              ;;
            OOS14+15)
              jq_filter="map(select(.os_version == \"OOS14\" or .os_version == \"OOS15\"))"
              ;;
            OOS16)
              jq_filter="map(select(.os_version == \"OOS16\"))"
              ;;
            OOS15)
              jq_filter="map(select(.os_version == \"OOS15\"))"
              ;;
            OOS14)
              jq_filter="map(select(.os_version == \"OOS14\"))"
              ;;
            android*-*.*)
              IFS='-' read -r av kv <<< "$input"
              jq_filter="map(select(.os_version == \"OOS15\" or .os_version == \"OOS16\")) | map(select(.android_version == \"$av\" and .kernel_version == \"$kv\"))"
              echo "Ōä╣’ĖÅ  Android-Kernel filter applied: $av-$kv"
              echo "   Restricted to: OOS15 and OOS16 only"
              ;;
            *)
              echo "::warning::Unknown input '$input'. Using empty filter."
              jq_filter="map(select(false))"
              ;;
          esac

          filtered=$(jq -c "$jq_filter" matrix.json)

          if [ -n "$target_model" ]; then
            echo "­¤Ä» Target model filter enabled: $target_model"
            filtered=$(echo "$filtered" | jq -c --arg target "$target_model" '
              map(select(.model == $target or (.model | startswith($target + "-"))))
            ')
          else
            echo "Ōä╣’ĖÅ  No target model selected. Building all configs matching op_model='$input'."
          fi

          count=$(jq 'length' <<< "$filtered")

          filtered=$(echo "$filtered" | jq '
            sort_by(
              (.os_version | gsub("OOS"; "") | tonumber) * -1,
              .model
            )
          ')

          if [ "$count" -eq 0 ]; then
            echo "::error::No config files found for op_model='$input' and op_target_model='${target_model:-<empty>}' after applying filters!"
            jq -r '.[] | "  - \(.model) (\(.os_version), \(.android_version)-\(.kernel_version))"' matrix.json
            exit 1
          fi

          echo "$filtered" | jq '.' > matrix.json

          merged_matrix=$(jq -n --argjson devices "$filtered" --argjson ksu_list "$ksu_options_normalized" '
            [
              $devices[] as $dev
              | $ksu_list[] as $ksu
              | ($dev + {ksu_type: $ksu.type, ksu_hash: $ksu.hash})
            ]
          ')

          final_count=$(echo "$merged_matrix" | jq 'length')

          echo "Ō£ģ Found $final_count build job(s)"
          jq -r '.[] | "  - \(.model) (\(.os_version), \(.android_version)-\(.kernel_version), \(.ksu_type) - \(.ksu_hash))"' <<< "$merged_matrix"

          echo "count=$count" >> "$GITHUB_OUTPUT"

          ksu_type=$(echo "$ksu_options_normalized" | jq -r '.[0].type')
          ksu_ref=$(echo "$ksu_options_normalized" | jq -r '.[0].hash')

          if [ "$ksu_type" != "SUKISU" ]; then
            echo "::error::Only SUKISU/SukiSU Ultra is supported. Got: $ksu_type"
            exit 1
          fi

          KSU_REPO_OWNER="SukiSU-Ultra"
          KSU_REPO_NAME="SukiSU-Ultra"

          HEAD_REF="refs/heads/${ksu_ref}"
          TAG_REF="refs/tags/${ksu_ref}"

          QUERY='query($owner: String!, $name: String!, $headRef: String!, $tagRef: String!, $objRef: String!) {
            repository(owner: $owner, name: $name) {
              hb: ref(qualifiedName: $headRef) { t: target { ... on Commit { o: oid } } }
              ht: ref(qualifiedName: $tagRef) { t: target { ... on Commit { o: oid } } }
              ho: object(expression: $objRef) { ... on Commit { o: oid } }
            }
          }'

          MAX_RETRIES=3
          RETRY_COUNT=0
          RETRY_DELAY=5

          echo "Resolving $ksu_type hash ($ksu_ref)..."

          until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
            RESULT=$(gh api graphql \
              -f query="$QUERY" \
              -f owner="$KSU_REPO_OWNER" \
              -f name="$KSU_REPO_NAME" \
              -f headRef="$HEAD_REF" \
              -f tagRef="$TAG_REF" \
              -f objRef="$ksu_ref" 2>/dev/null)
            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ] && [ -n "$RESULT" ]; then
              echo "  Ō£ģ API Success"
              break
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "::warning::API failed (Attempt $RETRY_COUNT/$MAX_RETRIES). Retrying in ${RETRY_DELAY}s..."
            sleep "$RETRY_DELAY"
          done

          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "::error::GitHub API unreachable. Cannot validate $ksu_ref"
            exit 1
          fi

          resolved_sha=$(echo "$RESULT" | jq -r '.data.repository | (.hb.t.o // .ht.t.o // .ho.o // "unknown")')

          if [ "$resolved_sha" = "unknown" ]; then
            echo "::error::Ref/Hash '$ksu_ref' does not exist in $KSU_REPO_OWNER/$KSU_REPO_NAME"
            exit 1
          fi

          echo "  Ō£ģ Resolved: $ksu_type/$ksu_ref ŌåÆ $resolved_sha"
          echo "ksu_resolved_hash=$resolved_sha" >> "$GITHUB_OUTPUT"

          merged_matrix=$(echo "$merged_matrix" | jq --arg resolved_sha "$resolved_sha" '
            map(.ksu_resolved_hash = $resolved_sha)
          ')

          GITLAB_PROJECT_PATH="simonpunk/susfs4ksu"

          declare -A default_branches=(
            ["android12-5.10"]="gki-android12-5.10"
            ["android13-5.15"]="gki-android13-5.15"
            ["android14-6.1"]="gki-android14-6.1"
            ["android15-6.6"]="gki-android15-6.6"
            ["android16-6.12"]="gki-android16-6.12"
          )

          declare -A user_inputs=(
            ["android12-5.10"]="${{ inputs.android12-5_10_susfs_branch_or_commit }}"
            ["android13-5.15"]="${{ inputs.android13-5_15_susfs_branch_or_commit }}"
            ["android14-6.1"]="${{ inputs.android14-6_1_susfs_branch_or_commit }}"
            ["android15-6.6"]="${{ inputs.android15-6_6_susfs_branch_or_commit }}"
            ["android16-6.12"]="${{ inputs.android16-6_12_susfs_branch_or_commit }}"
          )

          mapfile -t active_keys < <(
            echo "$merged_matrix" \
              | jq -r '.[] | select(.susfs == true) | "\(.android_version)-\(.kernel_version)"' \
              | sort -u
          )

          echo "­¤öŹ Resolving SUSFS hashes for: ${active_keys[*]:-none}"

          declare -A susfs_hashes
          declare -A susfs_versions_per_key

          for key in "${active_keys[@]}"; do
            default_val="${default_branches[$key]}"
            user_val="${user_inputs[$key]:-$default_val}"

            HASH_QUERY="{ project(fullPath: \"${GITLAB_PROJECT_PATH}\") { repository { ch: commit(ref: \"${user_val}\") { sha } } } }"
            RELEASE_QUERY="{ project(fullPath: \"${GITLAB_PROJECT_PATH}\") { repository { ch: commit(ref: \"${user_val}\") { sha } blobs(paths: [\"kernel_patches/include/linux/susfs.h\"], ref: \"${user_val}\") { nodes { rawBlob } } } } }"

            if [ "${{ inputs.make_release }}" = "true" ]; then
              GL_QUERY="$RELEASE_QUERY"
            else
              GL_QUERY="$HASH_QUERY"
            fi

            MAX_RETRIES=3
            RETRY_COUNT=0
            RETRY_DELAY=5
            resolved=""

            until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
              RESPONSE=$(curl -s --fail -G "https://gitlab.com/api/graphql" --data-urlencode "query=$GL_QUERY")
              EXIT_CODE=$?

              if [ $EXIT_CODE -eq 0 ] && [ -n "$RESPONSE" ]; then
                resolved=$(echo "$RESPONSE" | jq -r '.data.project.repository.ch.sha // empty')
                if [ -n "$resolved" ] && [ "$resolved" != "null" ]; then
                  echo "  Ō£ģ Query for $key Success"

                  if [ "${{ inputs.make_release }}" = "true" ]; then
                    extracted=$(echo "$RESPONSE" | jq -r '.data.project.repository.blobs.nodes[0].rawBlob // empty' | grep '#define SUSFS_VERSION' | awk -F'"' '{print $2}')
                    susfs_versions_per_key[$key]="${extracted:-unknown}"
                    echo "  Ō£ģ $key ŌåÆ SUSFS_VERSION = ${extracted:-unknown}"
                  fi

                  break
                fi
              fi

              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "::warning::GitLab GraphQL API failed (Attempt $RETRY_COUNT/$MAX_RETRIES). Retrying..."
              sleep "$RETRY_DELAY"
            done

            if [ -z "$resolved" ] || [ "$resolved" = "null" ]; then
              echo "::error::Could not resolve SUSFS ref '$user_val' for $key on GitLab."
              exit 1
            fi

            if [ "${{ inputs.make_release }}" = "true" ] && [ "${susfs_versions_per_key[$key]:-unknown}" = "unknown" ]; then
              echo "::error::Could not extract SUSFS_VERSION from susfs.h for '$key'. Cannot proceed with release."
              exit 1
            fi

            susfs_hashes["$key"]="$resolved"
            echo "  Ō£ģ Resolved: $key ŌåÆ $resolved"
          done

          active_gki_keys_csv=$(IFS=','; echo "${active_keys[*]:-}")
          echo "active_gki_keys=$active_gki_keys_csv" >> "$GITHUB_OUTPUT"

          echo "susfs_hash_android12_5_10=${susfs_hashes[android12-5.10]:-unknown}" >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android13_5_15=${susfs_hashes[android13-5.15]:-unknown}" >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android14_6_1=${susfs_hashes[android14-6.1]:-unknown}" >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android15_6_6=${susfs_hashes[android15-6.6]:-unknown}" >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android16_6_12=${susfs_hashes[android16-6.12]:-unknown}" >> "$GITHUB_OUTPUT"

          if [ "${{ inputs.make_release }}" = "true" ]; then
            susfs_base_version="unknown"

            for key in "${active_keys[@]}"; do
              ver="${susfs_versions_per_key[$key]:-unknown}"
              if [ "$ver" != "unknown" ]; then
                susfs_base_version="$ver"
                break
              fi
            done

            if [ "$susfs_base_version" = "unknown" ]; then
              echo "::error::Could not extract SUSFS_VERSION from susfs.h for any active GKI key. Cannot proceed with release."
              exit 1
            fi

            for key in "${active_keys[@]}"; do
              key_ver="${susfs_versions_per_key[$key]:-unknown}"
              if [ "$key_ver" != "$susfs_base_version" ]; then
                echo "::error::SUSFS version mismatch: '$key' has '$key_ver', expected '$susfs_base_version'."
                exit 1
              fi
            done

            echo "susfs_base_version=$susfs_base_version" >> "$GITHUB_OUTPUT"
          fi

          susfs_hashes_json=$(jq -n \
            --arg a12 "${susfs_hashes[android12-5.10]:-unknown}" \
            --arg a13 "${susfs_hashes[android13-5.15]:-unknown}" \
            --arg a14 "${susfs_hashes[android14-6.1]:-unknown}" \
            --arg a15 "${susfs_hashes[android15-6.6]:-unknown}" \
            --arg a16 "${susfs_hashes[android16-6.12]:-unknown}" \
            '{
              "android12-5.10": $a12,
              "android13-5.15": $a13,
              "android14-6.1":  $a14,
              "android15-6.6":  $a15,
              "android16-6.12": $a16
            }'
          )

          merged_matrix=$(echo "$merged_matrix" | jq \
            --argjson hashes "$susfs_hashes_json" \
            '[.[] | . + {susfs_resolved_hash: ($hashes["\(.android_version)-\(.kernel_version)"] // "unknown")}]'
          )

          merged_matrix=$(echo "$merged_matrix" | jq '
            sort_by(
              (.os_version | gsub("OOS"; "") | tonumber? // 0) * -1,
              .model
            )
          ')

          wrapped=$(jq -n --argjson items "$merged_matrix" '{ include: $items }')
          echo "matrix=$(jq -c . <<< "$wrapped")" >> "$GITHUB_OUTPUT"

          echo "::endgroup::"

      - name: Upload build matrix
        uses: actions/upload-artifact@v7
        with:
          name: build-matrix
          path: matrix.json
          archive: false
          retention-days: 7

      - name: ­¤ōŖ Build plan summary
        shell: bash
        run: |
          ksu_type="${{ fromJSON(steps.set-matrix.outputs.ksu_options_normalized)[0].type }}"
          ksu_ref="${{ fromJSON(steps.set-matrix.outputs.ksu_options_normalized)[0].hash }}"

          if [[ "$ksu_ref" =~ ^[0-9a-f]{40}$ ]]; then
            ksu_display="­¤ōī \`$ksu_type\`, \`$ksu_ref\`"
          else
            ksu_display="­¤öĆ \`$ksu_type\`, \`$ksu_ref\` (\`${{ steps.set-matrix.outputs.ksu_resolved_hash }}\`)"
          fi

          target_model_input="${{ inputs.op_target_model }}"
          if [ -z "$target_model_input" ]; then
            target_model_display="All configs matching selected target"
          else
            target_model_display="\`$target_model_input\`"
          fi

          build_ts_input="${{ inputs.build_timestamp }}"
          if [ -z "$build_ts_input" ]; then
            build_ts_display="ŌÅ▒’ĖÅ auto (current UTC build time)"
          else
            build_ts_display="­¤ōī \`$build_ts_input\`"
          fi

          {
            cat << EOF
          ## ­¤Ä» Build Plan

          **Target:** ${{ inputs.op_model }}  
          **Target Model:** $target_model_display  
          **Devices:** ${{ steps.set-matrix.outputs.count }}  

          **Configuration:**
          EOF

            echo "- ReSukiSU Config: $ksu_display"
            echo "- Target Model: $target_model_display"
            echo "- Build Timestamp: $build_ts_display"

            cat << EOF
          - Optimization: ${{ inputs.optimize_level }}
          - Clean Build/No Ccache: ${{ inputs.clean_build && 'Ō£ģ Yes' || 'ŌØī No' }}
          - Create Release: ${{ inputs.make_release && 'Ō£ģ Yes' || 'ŌØī No' }}
          - Create Debug Artifacts: ${{ inputs.debug && 'Ō£ģ Yes' || 'ŌØī No' }}
          - ADIOS I/O Scheduler: ${{ inputs.enable_adios && 'Ō£ģ Yes' || 'ŌØī No' }}
          - Sync toolchains: ${{ inputs.mirror_toolchains && 'Ō£ģ Yes' || 'ŌØī No' }}

          **SUSFS Configuration:**
          EOF
          } >> "$GITHUB_STEP_SUMMARY"

          declare -A susfs_inputs=(
            ["android12-5.10"]="${{ inputs.android12-5_10_susfs_branch_or_commit }}"
            ["android13-5.15"]="${{ inputs.android13-5_15_susfs_branch_or_commit }}"
            ["android14-6.1"]="${{ inputs.android14-6_1_susfs_branch_or_commit }}"
            ["android15-6.6"]="${{ inputs.android15-6_6_susfs_branch_or_commit }}"
            ["android16-6.12"]="${{ inputs.android16-6_12_susfs_branch_or_commit }}"
          )

          declare -A step_hashes=(
            ["android12-5.10"]="${{ steps.set-matrix.outputs.susfs_hash_android12_5_10 }}"
            ["android13-5.15"]="${{ steps.set-matrix.outputs.susfs_hash_android13_5_15 }}"
            ["android14-6.1"]="${{ steps.set-matrix.outputs.susfs_hash_android14_6_1 }}"
            ["android15-6.6"]="${{ steps.set-matrix.outputs.susfs_hash_android15_6_6 }}"
            ["android16-6.12"]="${{ steps.set-matrix.outputs.susfs_hash_android16_6_12 }}"
          )

          IFS=',' read -ra active_keys_display <<< "${{ steps.set-matrix.outputs.active_gki_keys }}"

          for key in "${active_keys_display[@]}"; do
            [ -z "$key" ] && continue

            value="${susfs_inputs[$key]:-}"
            fetched_hash="${step_hashes[$key]:-unknown}"

            if [ -z "$value" ]; then
              echo "- $key: ­¤öä auto (\`$fetched_hash\`)" >> "$GITHUB_STEP_SUMMARY"
            elif [[ "$value" =~ ^[0-9a-f]{40}$ ]]; then
              echo "- $key: ­¤ōī \`$value\`" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- $key: ­¤öĆ \`$value\` (\`$fetched_hash\`)" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> **­¤ÆĪ Note:** Hashes are resolved at run time via API calls before builds start." >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ inputs.op_model }}" == android*-*.* ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> **ŌÜĀ’ĖÅ Android-Kernel Filter:** Only OOS15 and OOS16 devices will be built for \`${{ inputs.op_model }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

  mirror_toolchain:
    needs: set-op-model
    if: ${{ inputs.mirror_toolchains }}
    uses: ./.github/workflows/mirror-toolchains.yml
    secrets: inherit

  build:
    name: build (${{ matrix.model }}, ${{ matrix.soc }}, ${{ matrix.branch }}, ${{ matrix.manifest }}, ${{ matrix.android_version }}, ${{ matrix.kernel_version }}, ${{ matrix.os_version }}, ${{ matrix.ksu_type }})
    needs:
      - set-op-model
      - mirror_toolchain
    if: |
      !cancelled() &&
      needs.set-op-model.result == 'success' &&
      (needs.mirror_toolchain.result == 'success' || needs.mirror_toolchain.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-op-model.outputs.matrix) }}
    outputs:
      sukisu_ver: ${{ steps.build-stat.outputs.sukisu_ver }}
    steps:
      - name: ­¤ōź Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: ­¤¦╣ Emergency Disk Cleanup
        if: ${{ matrix.disk_cleanup }}
        uses: ./.github/actions/disk-cleanup

      - name: Install Minimal Dependencies
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Install dependencies"
          sudo apt-get -o Acquire::Retries=3 update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync unzip dwarves file python3 ccache jq bc dos2unix kmod libdw-dev elfutils pigz
          sudo apt-get clean
          echo "Ō£ģ Dependencies installed"
          echo "::endgroup::"

      - name: Install ccache with ECS by cctv18
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Install ccache with ECS"

          CUSTOM_CCACHE_URLS=(
            "https://raw.githubusercontent.com/WildKernels/kernel_patches/main/ccache/ccache-x86-64"
            "https://github.com/WildKernels/kernel_patches/raw/main/ccache/ccache-x86-64"
            "https://github.com/WildKernels/kernel_patches/raw/refs/heads/main/ccache/ccache-x86-64"
          )

          TMP_DIR="$(mktemp -d)"
          TMP_CCACHE="$TMP_DIR/ccache"
          CUSTOM_CCACHE_OK=false

          cleanup() {
            rm -rf "$TMP_DIR" || true
          }
          trap cleanup EXIT

          for url in "${CUSTOM_CCACHE_URLS[@]}"; do
            echo "Trying custom ccache URL: $url"

            rm -f "$TMP_CCACHE"

            if curl -LfsS \
              --retry 8 \
              --retry-delay 10 \
              --retry-max-time 300 \
              --retry-all-errors \
              --connect-timeout 30 \
              --max-time 300 \
              --tcp-fastopen \
              -H "User-Agent: Mozilla/5.0" \
              -H "Accept: application/octet-stream,*/*" \
              "$url" \
              -o "$TMP_CCACHE"; then

              if [ ! -s "$TMP_CCACHE" ]; then
                echo "::warning::Downloaded custom ccache is empty from $url"
                continue
              fi

              chmod +x "$TMP_CCACHE"

              echo "Downloaded file type:"
              file "$TMP_CCACHE" || true

              if ! file "$TMP_CCACHE" | grep -qiE 'ELF|executable'; then
                echo "::warning::Downloaded file is not an executable binary from $url"
                continue
              fi

              echo "Testing custom ccache binary:"
              if "$TMP_CCACHE" --version; then
                echo "Ō£ģ Custom ECS ccache binary is valid"
                sudo install -m 0755 "$TMP_CCACHE" /usr/bin/ccache
                CUSTOM_CCACHE_OK=true
                break
              else
                echo "::warning::Downloaded custom ccache failed --version from $url"
              fi
            else
              echo "::warning::Failed to download custom ccache from $url"
            fi

            sleep 3
          done

          if [ "$CUSTOM_CCACHE_OK" != "true" ]; then
            echo "::warning::Custom ECS ccache unavailable. Falling back to apt/system ccache."

            if ! command -v ccache >/dev/null 2>&1 || ! ccache --version >/dev/null 2>&1; then
              echo "System ccache not found or invalid. Installing via apt..."
              sudo apt-get -o Acquire::Retries=3 update -qq
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ccache
            fi
          fi

          if ! command -v ccache >/dev/null 2>&1 || ! ccache --version >/dev/null 2>&1; then
            echo "::error::ccache is still unavailable after fallback"
            exit 1
          fi

          echo "[DEBUG] ccache path: $(command -v ccache)"
          echo "[DEBUG] ccache version:"
          ccache --version || true

          echo "::endgroup::"

      - name: ŌÖ╗’ĖÅ Configure ccache & LTO cache (bounded)
        shell: bash
        run: |
          echo "::group::Configure ccache environment"
          set -euo pipefail

          if command -v ccache >/dev/null 2>&1; then
            CACHE_DIR="${{ github.workspace }}/.ccache"
            LDCACHE_DIR="${{ github.workspace }}/.ld_cache"
            CCACHE_LOG="${{ github.workspace }}/ccache.log"

            mkdir -p "$CACHE_DIR"
            mkdir -p "$LDCACHE_DIR"

            SETTINGS=(
              "CCACHE_DIR=$CACHE_DIR"
              "LDCACHE_DIR=$LDCACHE_DIR"

              # Size / identity
              "CCACHE_MAXSIZE=12G"
              "CCACHE_COMPILERCHECK=content"
              "CCACHE_BASEDIR=${GITHUB_WORKSPACE}"

              # Path handling
              "CCACHE_NOHASHDIR=true"
              "CCACHE_IGNOREOPTIONS=--sysroot*"

              # Compression - compatible naming
              "CCACHE_COMPRESS=true"
              "CCACHE_COMPRESSLEVEL=3"

              # Direct mode
              "CCACHE_DIRECT=true"
              "CCACHE_NOREADONLY_DIRECT=true"

              # Filesystem optimizations - compatible naming
              "CCACHE_FILECLONE=true"
              "CCACHE_INODECACHE=true"

              # Kernel/build tuning
              "CCACHE_UMASK=002"
              "CCACHE_SLOPPINESS=file_macro,time_macros,include_file_mtime,include_file_ctime,pch_defines,system_headers,locale"
            )

            for setting in "${SETTINGS[@]}"; do
              export "$setting"
              echo "$setting" >> "$GITHUB_ENV"
            done

            if [ "${{ inputs.debug }}" = "true" ]; then
              export CCACHE_LOGFILE="$CCACHE_LOG"
              echo "CCACHE_LOGFILE=$CCACHE_LOG" >> "$GITHUB_ENV"
            fi

            echo "Ō£ģ ccache configured successfully"
            echo ""
            echo "ccache binary:"
            command -v ccache || true
            echo ""
            echo "ccache version:"
            ccache --version || true
            echo ""
            echo "ccache config:"
            ccache -p || true
          else
            echo "ccache not found, skipping configuration."
          fi

          echo "::endgroup::"

      - name: ­¤öŹ Verify ccache environment
        shell: bash
        run: |
          echo "::group::ccache env check"
          set -euo pipefail

          echo "Active CCACHE_* variables:"
          env | sort | grep '^CCACHE_' || true

          echo ""
          echo "Checking forbidden/problematic variables..."

          if env | grep -q '^CCACHE_DEPEND='; then
            echo "::error::CCACHE_DEPEND is still set. Remove it from workflow/action/scripts."
            exit 1
          fi

          if env | grep -q '^CCACHE_READONLY_DIRECT='; then
            echo "::error::CCACHE_READONLY_DIRECT is still set. Use CCACHE_NOREADONLY_DIRECT=true instead."
            exit 1
          fi

          echo "Ō£ģ No forbidden ccache variables found"

          echo ""
          echo "ccache final config:"
          ccache -p || true

          echo "::endgroup::"

      - name: ­¤¦╣ Prepare op_config_json (without KSU fields)
        id: prepare_config
        shell: bash
        run: |
          echo "config_json=$(jq -nc --argjson m '${{ toJSON(matrix) }}' '$m | del(.ksu_type, .ksu_hash, .ksu_resolved_hash, .susfs_resolved_hash)')" >> "$GITHUB_OUTPUT"

      - name: ­¤ö© Build Kernel
        id: build
        uses: ./.github/actions/build-kernel
        with:
          op_config_json: ${{ steps.prepare_config.outputs.config_json }}
          ksu_type: ${{ matrix.ksu_type }}
          ksu_branch_or_hash: ${{ matrix.ksu_resolved_hash }}
          susfs_commit_hash_or_branch: ${{ matrix.susfs_resolved_hash }}
          optimize_level: ${{ inputs.optimize_level }}
          build_timestamp: ${{ inputs.build_timestamp }}
          clean: ${{ inputs.clean_build }}
          debug: ${{ inputs.debug }}
          enable_adios: ${{ inputs.enable_adios }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: ­¤ōŖ Build statistics
        id: build-stat
        if: always()
        shell: bash
        run: |
          echo "::group::Build Statistics"

          echo "Device: ${{ matrix.model }}"
          echo "OS Version: ${{ matrix.os_version }}"
          echo "Kernel: ${{ matrix.android_version }}-${{ matrix.kernel_version }}"

          if [ "${{ matrix.susfs }}" = "true" ]; then
            echo "SUSFS Hash: ${{ matrix.susfs_resolved_hash }}"
          fi

          echo "Status: ${{ job.status }}"

          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo ""
            echo "Ō£ģ Build completed successfully"
            echo ""
            echo "Outputs:"
            echo "  - Kernel: ${{ steps.build.outputs.kernel_version }}"
            echo "  - SukiSU Ultra: v${{ steps.build.outputs.ksu_version }}"
            echo "sukisu_ver=${{ steps.build.outputs.ksu_version }}" >> "$GITHUB_OUTPUT"

            if [ "${{ matrix.susfs }}" = "true" ]; then
              echo "  - SUSFS: ${{ steps.build.outputs.susfs_version }}"
            fi

            echo "  - Build timestamp: ${{ steps.build.outputs.build_timestamp }}"
            echo "  - Build time: ${{ steps.build.outputs.build_time }}s"

            if [ "${{ inputs.clean_build }}" != "true" ]; then
              echo "  - ccache hit rate: ${{ steps.build.outputs.ccache_hit_rate }}"
              echo "  - ccache direct rate: ${{ steps.build.outputs.ccache_direct_rate }}"
            else
              echo "  - ccache: disabled (clean build)"
            fi

            if [ -n "${{ steps.build.outputs.warnings }}" ]; then
              echo "  - Warnings: ${{ steps.build.outputs.warnings }}"
            fi
          else
            echo "ŌØī Build failed"
          fi

          echo "::endgroup::"

      - name: ­¤ōØ Job summary
        if: always()
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF

          ### ${{ matrix.model }} (${{ matrix.os_version }}) - ${{ job.status == 'success' && 'Ō£ģ Success' || 'ŌØī Failed' }}

          **Kernel:** ${{ matrix.android_version }}-${{ matrix.kernel_version }}  
          **Timestamp:** \`${{ steps.build.outputs.build_timestamp }}\`  
          **ADIOS I/O Scheduler:** \`${{ inputs.enable_adios }}\`
          EOF

          if [ "${{ matrix.susfs }}" = true ]; then
            cat >> "$GITHUB_STEP_SUMMARY" << EOF
          **SUSFS Hash:** \`${{ matrix.susfs_resolved_hash }}\`
          EOF
          fi

          if [ "${{ steps.build.outcome }}" = "success" ]; then
            cat >> "$GITHUB_STEP_SUMMARY" << EOF

          | Metric | Value |
          |--------|-------|
          | **Kernel** | ${{ steps.build.outputs.kernel_version }} |
          | **SukiSU Ultra** | v${{ steps.build.outputs.ksu_version }} |
          | **Build Timestamp** | \`${{ steps.build.outputs.build_timestamp }}\` |
          EOF

            if [ "${{ matrix.susfs }}" = true ]; then
              cat >> "$GITHUB_STEP_SUMMARY" << EOF
          | **SUSFS** | ${{ steps.build.outputs.susfs_version }} |
          EOF
            fi

            cat >> "$GITHUB_STEP_SUMMARY" << EOF
          | **Build Time** | ${{ steps.build.outputs.build_time }}s |
          EOF

            if [ "${{ inputs.clean_build }}" != "true" ]; then
              cat >> "$GITHUB_STEP_SUMMARY" << EOF
          | **ccache Hit Rate** | ${{ steps.build.outputs.ccache_hit_rate }} |
          | **ccache Direct Rate** | ${{ steps.build.outputs.ccache_direct_rate }} |
          EOF
            fi

            if [ -n "${{ steps.build.outputs.warnings }}" ]; then
              echo "| **Warnings** | ${{ steps.build.outputs.warnings }} |" >> "$GITHUB_STEP_SUMMARY"
            fi

            cat >> "$GITHUB_STEP_SUMMARY" << EOF

          **Image SHA256:** \`${{ steps.build.outputs.image_sha256 }}\`  
          **AnyKernel3 Zip SHA256:** \`${{ steps.build.outputs.zip_sha256 }}\`
          EOF
          fi

      - name: ­¤¦╣ Final cleanup and space report
        if: always()
        shell: bash
        run: |
          echo "::group::Cleanup"

          sudo rm -rf "$GITHUB_WORKSPACE/out" || true
          sudo rm -rf "$GITHUB_WORKSPACE/build" || true
          sudo rm -rf "$GITHUB_WORKSPACE/kernel/out" || true
          sudo rm -rf "$GITHUB_WORKSPACE/.repo" || true
          sudo rm -rf /tmp/* || true

          if command -v ccache >/dev/null 2>&1; then
            echo ""
            echo "­¤ōŖ ccache statistics after build:"
            ccache -s || true
            echo ""
            echo "­¤ÆŠ ccache preserved for next build"
          fi

          echo ""
          echo "­¤ÆĮ Final disk usage:"
          df -h /

          echo "::endgroup::"

  trigger-release:
    needs:
      - set-op-model
      - build
    runs-on: ubuntu-latest
    if: |
      !cancelled() &&
      inputs.make_release == true &&
      needs.build.result == 'success' &&
      needs.set-op-model.result == 'success'
    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SUSFS_BASE_VERSION: ${{ needs.set-op-model.outputs.susfs_base_version }}
      RELEASE_NAME: 'OnePlus Kernels - SukiSU Ultra + SUSFS ${{ needs.set-op-model.outputs.susfs_base_version }}'

    steps:
      - name: ­¤ōź Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ­¤öÄ Debug tag target commit
        shell: bash
        run: |
          set -euo pipefail

          echo "HEAD commit:"
          git rev-parse HEAD

          echo ""
          echo "Files changed in HEAD:"
          git show --name-only --oneline --no-renames HEAD

          echo ""
          if git show --name-only --oneline --no-renames HEAD | grep -q '^\.github/workflows/'; then
            echo "::warning::HEAD modifies a workflow file. GITHUB_TOKEN may be blocked from creating a tag on this commit."
            echo "::warning::Create one extra non-workflow commit, then rerun the workflow."
          fi

      - name: ­¤ÅĘ’ĖÅ Generate and Create New Tag
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          LATEST_MATCHING_TAG="$(
            {
              gh api --paginate "repos/$REPO_OWNER/$REPO_NAME/tags?per_page=100" \
                --jq '.[] | .name' \
                | grep -E "^${SUSFS_BASE_VERSION}-r[0-9]+$" || true
            } \
            | awk -F'-r' 'NF >= 2 {print $0 "\t" $2}' \
            | sort -k2,2n \
            | tail -n1 \
            | cut -f1
          )"

          if [ -z "$LATEST_MATCHING_TAG" ]; then
            NEW_TAG="${SUSFS_BASE_VERSION}-r1"
          else
            NEW_TAG="$(echo "$LATEST_MATCHING_TAG" | awk -F'-r' '{printf "%s-r%d", $1, $2+1}')"
          fi

          echo "New tag: $NEW_TAG"
          echo "NEW_TAG=${NEW_TAG}" >> "$GITHUB_ENV"

          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "::error::Local tag already exists: $NEW_TAG"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$NEW_TAG" >/dev/null 2>&1; then
            echo "::error::Remote tag already exists: $NEW_TAG"
            exit 1
          fi

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: ­¤ōź Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts
          merge-multiple: true
          skip-decompress: true

      - name: ­¤öÄ Inspect downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail

          echo "Downloaded artifacts tree:"
          find ./downloaded-artifacts -maxdepth 3 -type f -print | sort || true

          echo ""
          echo "ZIP files:"
          find ./downloaded-artifacts -maxdepth 3 -type f -name "*.zip" -print | sort || true

      - name: ­¤öÉ Generate Checksums
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t zip_files < <(find ./downloaded-artifacts -maxdepth 3 -type f -name "*.zip" | sort)

          if [ "${#zip_files[@]}" -eq 0 ]; then
            echo "::error::No ZIP artifacts found."
            find ./downloaded-artifacts -maxdepth 3 -type f -print || true
            exit 1
          fi

          : > 00_CHECKSUMS.txt

          for zip in "${zip_files[@]}"; do
            sha256sum "$zip"
          done | sort -k2 > 00_CHECKSUMS.txt

          echo "Generated 00_CHECKSUMS.txt:"
          cat 00_CHECKSUMS.txt

      - name: ­¤ōź Generate Downloads Index
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "# ­¤ōź OnePlus Kernel Downloads"
            echo ""
            echo "> Select the ZIP matching your exact **device**, **OOS version**, and **kernel base**."
            echo ""
            echo "## ŌÜĀ’ĖÅ Important"
            echo ""
            echo "- Flashing the wrong ZIP may cause bootloop."
            echo "- Back up your current boot/init_boot/vendor_boot before flashing."
            echo "- Use Kernel Flasher or another trusted flashing method."
            echo "- If switching from Magisk, APatch, KernelSU, SukiSU Ultra, or another fork, clean old root leftovers carefully."
            echo ""
            echo "## Quick Guide"
            echo ""
            echo "| What to check | Example |"
            echo "|---|---|"
            echo "| **Device** | \`OP12\`, \`OP13r\`, \`OP-NORD-4\` |"
            echo "| **OOS Version** | \`OOS16\`, \`OOS15\`, \`OOS14\` |"
            echo "| **Kernel Base** | \`android15-6.6.30\`, \`android14-6.1.75\` |"
            echo "| **Root Type** | \`SUKISU\` |"
            echo ""
          } > 00_DOWNLOADS.md

          for os in OOS16 OOS15 OOS14; do
            mapfile -t files < <(find downloaded-artifacts -maxdepth 3 -type f -name "*_${os}_*.zip" | sort)

            if [ "${#files[@]}" -eq 0 ]; then
              continue
            fi

            {
              echo "## ${os}"
              echo ""
              echo "| Device | Kernel | Root | SUSFS | Download | SHA256 |"
              echo "|---|---|---|---|---|---|"
            } >> 00_DOWNLOADS.md

            for file in "${files[@]}"; do
              name="$(basename "$file")"
              zipname="${name%.zip}"
              rest="${zipname#AK3_}"

              IFS='_' read -ra parts <<< "$rest"

              model="${parts[0]:-unknown}"
              os_version="${parts[1]:-unknown}"
              kernel_version="${parts[2]:-unknown}"
              ksu_type="${parts[3]:-unknown}"
              ksu_ver="${parts[4]:-unknown}"

              susfs_ver="none"
              if [ "${parts[5]:-}" = "SuSFS" ]; then
                susfs_ver="${parts[6]:-unknown}"
              fi

              sha="$(sha256sum "$file" | awk '{print $1}')"
              short_sha="${sha:0:12}"
              asset_url="${{ github.server_url }}/${{ github.repository }}/releases/download/${{ env.NEW_TAG }}/${name}"

              echo "| \`${model}\` | \`${kernel_version}\` | \`${ksu_type}-${ksu_ver}\` | \`${susfs_ver}\` | [Download](${asset_url}) | \`${short_sha}...\` |" >> 00_DOWNLOADS.md
            done

            echo "" >> 00_DOWNLOADS.md
          done

          {
            echo "---"
            echo ""
            echo "## ­¤öÉ Full SHA256 Checksums"
            echo ""
            echo "Use \`00_CHECKSUMS.txt\` from this release to verify downloads."
            echo ""
            echo '```bash'
            echo "sha256sum -c 00_CHECKSUMS.txt"
            echo '```'
          } >> 00_DOWNLOADS.md

          echo "Generated 00_DOWNLOADS.md:"
          cat 00_DOWNLOADS.md

      - name: ­¤ōØ Generate Device List and Final Release Notes
        id: generate-notes
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Start building the release notes ==="

          declare -A device_info

          MATRIX_JSON="$(find ./downloaded-artifacts -maxdepth 3 -type f -name "matrix.json" | head -n1 || true)"

          if [ -z "$MATRIX_JSON" ]; then
            echo "::warning::matrix.json not found in downloaded artifacts. Continuing without matrix metadata."
            JSON_BUILD_DATA="[]"
          else
            echo "Using matrix file: $MATRIX_JSON"
            JSON_BUILD_DATA="$(jq -c '.' "$MATRIX_JSON")"
          fi

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            zipname="$(basename "$file" .zip)"
            rest="${zipname#AK3_}"

            IFS='_' read -ra parts <<< "$rest"

            model="${parts[0]:-unknown}"
            os_version="${parts[1]:-unknown}"
            kernel_version="${parts[2]:-unknown}"
            ksu_type_asset="${parts[3]:-unknown}"
            ksu_ver="${parts[4]:-unknown}"

            if [ "${parts[5]:-}" = "SuSFS" ]; then
              susfs_ver="${parts[6]:-unknown}"
            else
              susfs_ver="none"
            fi

            file_name="$(basename "$file")"
            full_model="${model}_${os_version}_${kernel_version}"

            device_info["$full_model"]="$model|$os_version|$kernel_version|$ksu_type_asset|$ksu_ver|$susfs_ver|$file_name"
          done < <(find downloaded-artifacts -maxdepth 3 -name "*.zip" -type f | sort)

          if [ "${#device_info[@]}" -eq 0 ]; then
            echo "::error::No device ZIPs found!"
            exit 1
          fi

          ksu_type="${{ fromJSON(needs.set-op-model.outputs.ksu_options_normalized)[0].type }}"
          ksu_ref="${{ fromJSON(needs.set-op-model.outputs.ksu_options_normalized)[0].hash }}"
          ksu_resolved_hash="${{ needs.set-op-model.outputs.ksu_resolved_hash }}"

          OPTIMIZE_LEVEL="${{ inputs.optimize_level }}"
          CLEAN_BUILD="${{ inputs.clean_build }}"
          BUILD_TIMESTAMP_INPUT="${{ inputs.build_timestamp }}"

          declare -A susfs_map=(
            ["android12-5.10"]="${{ needs.set-op-model.outputs.susfs_hash_android12_5_10 }}"
            ["android13-5.15"]="${{ needs.set-op-model.outputs.susfs_hash_android13_5_15 }}"
            ["android14-6.1"]="${{ needs.set-op-model.outputs.susfs_hash_android14_6_1 }}"
            ["android15-6.6"]="${{ needs.set-op-model.outputs.susfs_hash_android15_6_6 }}"
            ["android16-6.12"]="${{ needs.set-op-model.outputs.susfs_hash_android16_6_12 }}"
          )

          IFS=',' read -ra active_gki_keys <<< "${{ needs.set-op-model.outputs.active_gki_keys }}"

          first_entry="$(printf '%s\n' "${!device_info[@]}" | sort | head -n1)"
          IFS='|' read -r _ _ _ _ ksu_ver_global _ _ <<< "${device_info[$first_entry]}"

          ksu_display_value() {
            local input="$1"
            local resolved="$2"

            if [[ "$input" =~ ^[0-9a-f]{40}$ ]]; then
              echo "$input"
            else
              echo "$input ($resolved)"
            fi
          }

          ksu_display="$(ksu_display_value "$ksu_ref" "$ksu_resolved_hash")"

          cat << EOF > release_notes.md
          # ­¤Ä» OnePlus Kernels with SukiSU Ultra & SUSFS ${SUSFS_BASE_VERSION}

          This release contains flashable AnyKernel3 ZIPs for supported OnePlus devices.

          > ŌÜĀ’ĖÅ **Important:** Match your exact **device model**, **OOS version**, and **kernel base** before flashing.

          ---

          ## ­¤ōź Downloads

          For the full grouped download table with SHA256 hashes, open:

          **Ō×Ī’ĖÅ \`00_DOWNLOADS.md\`**

          Quick asset helpers included in this release:

          - **\`00_DOWNLOADS.md\`** - grouped downloads by OOS version
          - **\`00_CHECKSUMS.txt\`** - full SHA256 checksums

          ---

          ## Ō£ģ Read Before Downloading

          - Download only the ZIP matching your **device**, **OOS version**, and **kernel base**.
          - Flashing the wrong kernel may cause bootloop.
          - Back up your current boot/init_boot/vendor_boot partitions.
          - If switching from Magisk, APatch, KernelSU, SukiSU Ultra, or another fork, clean old root leftovers carefully.

          ---

          ## ­¤ō” Built Devices (${#device_info[@]} total)

          | Model | OS | Kernel | Root | SUSFS | File |
          |---|---|---|---|---|---|
          EOF

          for full_key in $(printf '%s\n' "${!device_info[@]}" | sort); do
            IFS='|' read -r model os_ver kernel_ver ksu_type_asset ksu_ver susfs_ver file_name <<< "${device_info[$full_key]}"
            asset_url="${{ github.server_url }}/${{ github.repository }}/releases/download/${{ env.NEW_TAG }}/${file_name}"

            echo "| \`${model}\` | \`${os_ver}\` | \`${kernel_ver}\` | \`${ksu_type_asset}-${ksu_ver}\` | \`${susfs_ver}\` | [Download](${asset_url}) |" >> release_notes.md
          done

          cat << EOF >> release_notes.md

          ---

          ## ­¤ö¦ Build Configuration

          | Component | Version/Setting |
          |---|---|
          | **Root Solution** | \`SukiSU Ultra\` |
          | **SukiSU Ultra Ref** | \`${ksu_display}\` |
          | **SukiSU Ultra Version** | \`${ksu_ver_global}\` |
          | **SUSFS Version** | \`${SUSFS_BASE_VERSION}\` |
          | **Optimization Level** | \`${OPTIMIZE_LEVEL}\` |
          | **Clean Build** | $( [ "$CLEAN_BUILD" = "true" ] && echo "Ō£ģ Yes (no ccache)" || echo "ŌØī No (ccache enabled)" ) |
          | **Build Timestamp Input** | \`${BUILD_TIMESTAMP_INPUT:-auto}\` |
          | **Compiler** | Clang (version varies by device) |
          | **Workflow Run** | [\`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          ### ­¤ōī SUSFS Branch Mapping

          | Kernel Version | SUSFS Commit |
          |---|---|
          EOF

          for key in "${active_gki_keys[@]}"; do
            [ -z "$key" ] && continue
            echo "| \`${key}\` | \`${susfs_map[$key]:-unknown}\` |" >> release_notes.md
          done

