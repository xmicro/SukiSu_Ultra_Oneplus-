          - **KernelSU Team**
          - **ReSukiSU Team**
          - **SukiSU Ultra Team**
          - **simonpunk** - SUSFS development
          - **OnePlus** - Kernel source code
          - **Community Contributors**

          ---

          **ÔÜí Built with ÔŁĄ´ŞĆ by the community**
          EOF

          echo "--- Final Release Notes ---"
          cat release_notes.md

      - name: ­čÜÇ Create GitHub Release
        shell: bash
        run: |
          set -euo pipefail

          gh release create "${{ env.NEW_TAG }}" \
            --repo "${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}" \
            --title "${{ env.RELEASE_NAME }}" \
            --notes-file release_notes.md \
            --draft

      - name: ­čôĄ Upload Release Assets Dynamically
        shell: bash
        run: |
          set -euo pipefail

          ZIP_COUNT="$(find ./downloaded-artifacts -type f -name "*.zip" | wc -l | tr -d ' ')"

          if [ "$ZIP_COUNT" -eq 0 ]; then
            echo "::error::No ZIP files found for release upload."
            exit 1
          fi

          while IFS= read -r file; do
            echo "Uploading $file..."
            gh release upload "${{ env.NEW_TAG }}" "$file" --clobber
          done < <(find ./downloaded-artifacts -type f -name "*.zip" | sort)

      - name: ­čôŐ Release summary
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          ZIP_COUNT="$(find ./downloaded-artifacts -type f -name "*.zip" | wc -l | tr -d ' ')"

          {
            echo ""
            echo "---"
            echo ""
            echo "## ­čÄë Release Created Successfully"
            echo ""
            echo "**Tag:** [\`${{ env.NEW_TAG }}\`](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ env.NEW_TAG }})"
            echo "**Target Group:** \`${{ env.TARGET_GROUP }}\`"
            echo "**Target Model Filter:** \`${{ env.TARGET_MODEL_DISPLAY }}\`"
            echo "**Kernels:** \`$ZIP_COUNT\`"
            echo ""
            echo "### ­čôŽ Assets"
          } >> "$GITHUB_STEP_SUMMARY"

          while IFS= read -r zip; do
            name="$(basename "$zip")"
            size="$(stat -c%s "$zip")"
            size_mb="$(echo "scale=2; $size / 1024 / 1024" | bc)"
            echo "- \`$name\` (${size_mb} MB)" >> "$GITHUB_STEP_SUMMARY"
          done < <(find ./downloaded-artifacts -type f -name "*.zip" | sort)
