      - name: ­¤ÜĆ Create GitHub Release
        shell: bash
        run: |
          set -euo pipefail

          gh release create "${{ env.NEW_TAG }}" \
            --repo "${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}" \
            --title "${{ env.RELEASE_NAME }}" \
            --notes-file release_notes.md \
            --draft

      - name: ­¤ōż Upload Release Assets Dynamically
        shell: bash
        run: |
          set -euo pipefail

          echo "Uploading helper files..."
          gh release upload "${{ env.NEW_TAG }}" 00_DOWNLOADS.md --clobber --repo "${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}"
          gh release upload "${{ env.NEW_TAG }}" 00_CHECKSUMS.txt --clobber --repo "${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}"

          echo "Uploading kernel ZIPs..."

          mapfile -t zip_files < <(find ./downloaded-artifacts -maxdepth 3 -type f -name "*.zip" | sort)

          if [ "${#zip_files[@]}" -eq 0 ]; then
            echo "::error::No ZIP files found for upload."
            find ./downloaded-artifacts -maxdepth 3 -type f -print || true
            exit 1
          fi

          for file in "${zip_files[@]}"; do
            echo "Uploading $file..."
            gh release upload "${{ env.NEW_TAG }}" "$file" --clobber --repo "${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}"
          done

      - name: ­¤ōŖ Release summary
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          kernel_count="$(find ./downloaded-artifacts -maxdepth 3 -name "*.zip" -type f | wc -l)"

          cat >> "$GITHUB_STEP_SUMMARY" << EOF

          ---

          ## ­¤Äē Release Created Successfully

          **Tag:** [\`${{ env.NEW_TAG }}\`](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ env.NEW_TAG }})  
          **Release:** ${{ env.RELEASE_NAME }}  
          **Kernels:** ${kernel_count}

          ### ­¤ōś User Download Helpers

          - \`00_DOWNLOADS.md\` - grouped downloads by OOS version
          - \`00_CHECKSUMS.txt\` - SHA256 checksums

          ### ­¤ō” Assets
          EOF

          echo "- \`00_DOWNLOADS.md\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`00_CHECKSUMS.txt\`" >> "$GITHUB_STEP_SUMMARY"

          while IFS= read -r zip; do
            [ -z "$zip" ] && continue

            name="$(basename "$zip")"
            size="$(stat -c%s "$zip")"
            size_mb="$(echo "scale=2; $size / 1024 / 1024" | bc)"

            echo "- \`$name\` (${size_mb} MB)" >> "$GITHUB_STEP_SUMMARY"
          done < <(find ./downloaded-artifacts -maxdepth 3 -name "*.zip" -type f | sort)
