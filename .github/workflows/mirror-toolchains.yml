name: Mirror static toolchains to GitHub Release

permissions:
  contents: write

on:
  workflow_dispatch:
  workflow_call:

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure toolchain-cache tag and release exist
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TARGET_REPO="${{ github.repository }}"
          TAG_NAME="toolchain-cache"

          echo "📦 Ensuring tag and release '$TAG_NAME' exist in $TARGET_REPO..."

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "🔄 Fetching tags..."
          git fetch --tags --force origin || true

          echo "🔍 Checking Git tag..."

          if git rev-parse "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
            echo "✅ Tag '$TAG_NAME' already exists."
          else
            echo "🏷️ Tag '$TAG_NAME' not found. Creating backdated annotated tag..."

            GIT_COMMITTER_DATE="2015-01-01T12:00:00Z" \
            GIT_AUTHOR_DATE="2015-01-01T12:00:00Z" \
            git tag -a "$TAG_NAME" -m "Internal Toolchains Cache"

            git push origin "$TAG_NAME"

            echo "✅ Tag '$TAG_NAME' created and pushed."
          fi

          echo "🔍 Checking GitHub Release..."

          if gh release view "$TAG_NAME" --repo "$TARGET_REPO" >/dev/null 2>&1; then
            echo "✅ Release '$TAG_NAME' already exists."
          else
            echo "🚀 Release '$TAG_NAME' not found. Creating release..."

            gh release create "$TAG_NAME" \
              --repo "$TARGET_REPO" \
              --title "Toolchains Mirror Cache" \
              --notes "Deduplicated Toolchains for Kernel Build" \
              --latest=false

            echo "✅ Release '$TAG_NAME' created."
          fi

  generate-mirror-matrix:
    runs-on: ubuntu-latest
    needs: prepare-release

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Generate Mirror Matrix
        shell: bash
        run: |
          set -euo pipefail

          echo "📄 Generating combined config list..."

          echo "[" > all_configs.json

          mapfile -t files < <(find configs/ -name "*.json" | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No config JSON files found in configs/"
            exit 1
          fi

          for i in "${!files[@]}"; do
            cat "${files[$i]}" >> all_configs.json

            if [[ $((i + 1)) -lt ${#files[@]} ]]; then
              echo "," >> all_configs.json
            fi
          done

          echo "]" >> all_configs.json

          echo "✅ Generated all_configs.json"
          jq length all_configs.json

      - name: Resolve Unique Projects
        id: set-matrix
        shell: python
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          import xml.etree.ElementTree as ET
          import json
          import os
          import subprocess
          import shutil

          with open("all_configs.json", "r") as f:
              configs = json.load(f)

          unique_toolchains = {}

          # IMPORTANT:
          # Do NOT add AnyKernel3 here.
          # AnyKernel3 must be synced directly from the manifest.
          TOOLCHAIN_MAP = {
              "clang/host/linux-x86": "clang",
              "prebuilts/rust": "rust",
              "prebuilts/clang-tools": "clang-tools",
              "prebuilts/build-tools": "build-tools",
          }

          print(f"Processing {len(configs)} configurations...")
          print("-" * 50)

          for cfg in configs:
              op_model = cfg.get("model", "Unknown")
              op_branch = cfg.get("branch", "")
              op_manifest = cfg.get("manifest", "")
              op_os_version = cfg.get("os_version", "").lower()

              xml_file = "temp_manifest.xml"

              try:
                  if op_manifest.startswith("https://"):
                      subprocess.run(
                          ["curl", "-LfsS", op_manifest, "-o", xml_file],
                          check=True,
                      )

                  elif op_branch.startswith("wild/"):
                      local_manifest = f"manifests/{op_os_version}/{op_manifest}"

                      if not os.path.exists(local_manifest):
                          raise FileNotFoundError(f"Local manifest not found: {local_manifest}")

                      shutil.copy(local_manifest, xml_file)

                  else:
                      url = f"https://raw.githubusercontent.com/OnePlusOSS/kernel_manifest/refs/heads/{op_branch}/{op_manifest}"
                      subprocess.run(
                          ["curl", "-LfsS", url, "-o", xml_file],
                          check=True,
                      )

                  root = ET.parse(xml_file).getroot()

                  remotes = {
                      r.get("name"): r.get("fetch").rstrip("/")
                      for r in root.findall("remote")
                      if r.get("name") and r.get("fetch")
                  }

                  default = root.find("default")
                  def_remote = default.get("remote") if default is not None else None
                  def_rev = default.get("revision") if default is not None else None

                  for project in root.findall("project"):
                      name = project.get("name")

                      if not name:
                          continue

                      type_label = None

                      for repo_key, label in TOOLCHAIN_MAP.items():
                          if repo_key in name:
                              type_label = label
                              break

                      if not type_label:
                          continue

                      remote_name = project.get("remote", def_remote)
                      rev = project.get("revision", def_rev)

                      if not remote_name or not rev:
                          print(f"⚠️ Skipping {name}: missing remote or revision")
                          continue

                      base_url = remotes.get(remote_name, "").rstrip("/")

                      if not base_url:
                          print(f"⚠️ Skipping {name}: unknown remote '{remote_name}'")
                          continue

                      cache_filename = f"{type_label}-{rev}.tar.gz"

                      if cache_filename in unique_toolchains:
                          print(f"♻️ [{op_model}][{op_os_version}] -> Using existing {type_label}: {rev}")
                          continue

                      provider = "unknown"
                      repo_leaf = name.rstrip("/").split("/")[-1]
                      repo_url = f"{base_url}/{name}"

                      if "googlesource.com" in base_url:
                          provider = "googlesource"
                          dl_url = f"{base_url}/{name}/+archive/{rev}.tar.gz"
                          clone_url = f"{base_url}/{name}"

                      elif "github.com" in base_url:
                          provider = "github"
                          dl_url = f"{base_url}/{name}/archive/{rev}.tar.gz"
                          clone_url = f"{base_url}/{name}.git"

                      elif "git.codelinaro.org" in base_url or "gitlab.com" in base_url:
                          provider = "gitlab"

                          # Canonical GitLab/CodeLinaro archive URL.
                          # We still record it for logs, but GitLab/CodeLinaro jobs
                          # will skip HTTP archive download and use git archive locally.
                          dl_url = f"{base_url}/{name}/-/archive/{rev}/{repo_leaf}-{rev}.tar.gz"
                          clone_url = f"{base_url}/{name}.git"

                      else:
                          error_msg = f"❌ [FATAL] Unknown toolchain provider for: {base_url}"
                          print(f"::error::{error_msg}")
                          raise ValueError(error_msg)

                      unique_toolchains[cache_filename] = {
                          "rev": rev,
                          "url": dl_url,
                          "repo_url": repo_url,
                          "clone_url": clone_url,
                          "repo_leaf": repo_leaf,
                          "provider": provider,
                          "name": name,
                          "type_label": type_label,
                          "cache_file": cache_filename,
                      }

                      print(f"🆕 [{op_model}][{op_os_version}] -> New {type_label} found: {rev}")
                      print(f"    Provider: {provider}")
                      print(f"    URL:      {dl_url}")
                      print(f"    Clone:    {clone_url}")

              except Exception as e:
                  print(f"⚠️ Failed to process {op_manifest}: {e}")

          matrix = {
              "include": list(unique_toolchains.values())
          }

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")

          print(f"✅ Found {len(unique_toolchains)} unique projects to mirror.")

  mirror-to-release:
    name: mirror (${{ matrix.type_label }}, ${{ matrix.rev }})
    needs:
      - prepare-release
      - generate-mirror-matrix

    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-mirror-matrix.outputs.matrix) }}

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Install tools
        shell: bash
        run: |
          set -euo pipefail

          echo "📦 Installing required tools..."
          sudo apt-get update
          sudo apt-get install -y aria2 pigz git

          aria2c --version | head -n 1
          pigz --version || true
          git --version

      - name: Sync & Upload
        shell: bash
        run: |
          set -euo pipefail

          TARGET_REPO="${{ github.repository }}"
          TAG_NAME="toolchain-cache"

          REV="${{ matrix.rev }}"
          FILENAME="${{ matrix.cache_file }}"
          SOURCE_URL="${{ matrix.url }}"
          CLONE_URL="${{ matrix.clone_url }}"
          REPO_LEAF="${{ matrix.repo_leaf }}"
          PROVIDER="${{ matrix.provider }}"
          TYPE_LABEL="${{ matrix.type_label }}"

          BASE_URL="https://github.com/${TARGET_REPO}/releases/download/${TAG_NAME}"

          echo "============================================================"
          echo "📦 Toolchain Mirror Job"
          echo "============================================================"
          echo "Repository: $TARGET_REPO"
          echo "Release:    $TAG_NAME"
          echo "Type:       $TYPE_LABEL"
          echo "Revision:   $REV"
          echo "Filename:   $FILENAME"
          echo "Provider:   $PROVIDER"
          echo "Source URL: $SOURCE_URL"
          echo "Clone URL:  $CLONE_URL"
          echo "============================================================"

          echo "🔍 Verifying GitHub Release exists..."

          if gh release view "$TAG_NAME" --repo "$TARGET_REPO" >/dev/null 2>&1; then
            echo "✅ Release '$TAG_NAME' exists."
          else
            echo "⚠️ Release '$TAG_NAME' missing. Creating it now..."

            gh release create "$TAG_NAME" \
              --repo "$TARGET_REPO" \
              --title "Toolchains Mirror Cache" \
              --notes "Deduplicated Toolchains for Kernel Build" \
              --latest=false

            echo "✅ Release '$TAG_NAME' created."
          fi

          http_status() {
            local url="$1"
            local code

            code="$(curl \
              -IsL \
              -o /dev/null \
              -w "%{http_code}" \
              --connect-timeout 30 \
              --max-time 120 \
              -A "Mozilla/5.0" \
              -H "Accept: */*" \
              "$url" || true)"

            if [ -z "$code" ]; then
              code="000"
            fi

            echo "$code"
          }

          echo "🔍 Checking if $FILENAME exists in mirror..."

          STATUS="$(http_status "$BASE_URL/$FILENAME")"
          PART_STATUS="$(http_status "$BASE_URL/${FILENAME}.partaa")"

          echo "Single file status: $STATUS"
          echo "Part file status:   $PART_STATUS"

          if [ "$STATUS" = "200" ] || [ "$PART_STATUS" = "200" ]; then
            echo "✅ $TYPE_LABEL revision $REV already cached."
            exit 0
          fi

          download_with_aria2() {
            echo "🌐 Trying aria2c with browser-like headers, limited to 180s..."

            timeout 180s aria2c \
              -x1 \
              -s1 \
              -k1M \
              -j1 \
              --file-allocation=none \
              --console-log-level=warn \
              --summary-interval=30 \
              --retry-wait=10 \
              --max-tries=1 \
              --connect-timeout=30 \
              --timeout=120 \
              --lowest-speed-limit=1K \
              --allow-overwrite=true \
              --auto-file-renaming=false \
              --header="User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/120 Safari/537.36" \
              --header="Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
              --header="Accept-Language: en-US,en;q=0.9" \
              --header="Connection: keep-alive" \
              -o "$FILENAME" \
              "$SOURCE_URL"
          }

          download_with_curl() {
            echo "🌐 Trying curl fallback, limited to 180s..."

            timeout 180s curl \
              -L \
              --fail \
              --retry 2 \
              --retry-delay 10 \
              --retry-all-errors \
              --connect-timeout 30 \
              --max-time 170 \
              --speed-time 120 \
              --speed-limit 1024 \
              -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/120 Safari/537.36" \
              -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
              -H "Accept-Language: en-US,en;q=0.9" \
              -H "Connection: keep-alive" \
              -o "$FILENAME" \
              "$SOURCE_URL"
          }

          create_archive_from_git() {
            echo "🧰 Creating archive from git fetch + git archive..."
            echo "Clone URL: $CLONE_URL"
            echo "Revision:  $REV"

            rm -rf mirror-src "$FILENAME"

            git init mirror-src
            cd mirror-src

            git remote add origin "$CLONE_URL"

            git config http.version HTTP/1.1
            git config http.lowSpeedLimit 1000
            git config http.lowSpeedTime 600
            git config advice.detachedHead false

            echo "🔍 Fetching exact revision..."

            if git \
              -c http.userAgent="Mozilla/5.0 GitHub-Actions" \
              fetch \
              --no-tags \
              --depth=1 \
              origin \
              "$REV"; then

              echo "✅ Exact revision fetch succeeded."
              git checkout --force FETCH_HEAD

            else
              echo "⚠️ Direct revision fetch failed."
              echo "🔁 Trying advertised refs fallback..."

              git \
                -c http.userAgent="Mozilla/5.0 GitHub-Actions" \
                fetch \
                --no-tags \
                --depth=100 \
                origin \
                '+refs/heads/*:refs/remotes/origin/*'

              if git cat-file -e "${REV}^{commit}" 2>/dev/null; then
                echo "✅ Revision found after refs fallback."
                git checkout --force "$REV"
              else
                echo "::error::Revision $REV was not found after fallback fetch."
                echo "Available remote refs:"
                git branch -r || true
                exit 1
              fi
            fi

            echo "📦 Creating tar.gz with one top-level folder:"
            echo "Prefix: ${REPO_LEAF}-${REV}/"

            git archive \
              --format=tar \
              --prefix="${REPO_LEAF}-${REV}/" \
              HEAD | pigz -p "$(nproc)" > "../$FILENAME"

            cd ..

            rm -rf mirror-src
          }

          echo "📥 Not found. Downloading $TYPE_LABEL from source..."

          download_ok=false

          # CodeLinaro/GitLab archive generation is flaky for ALL prebuilts:
          # clang, build-tools, rust, clang-tools, etc.
          # It often hangs at 0B/0B or returns 403/timeout.
          # So for GitLab/CodeLinaro providers, skip HTTP archive entirely.
          if [ "$PROVIDER" = "gitlab" ]; then
            echo "🧰 CodeLinaro/GitLab toolchain detected: $TYPE_LABEL"
            echo "🧰 Skipping HTTP archive and using git fetch + git archive directly."
            create_archive_from_git
            download_ok=true
          else
            if download_with_aria2; then
              download_ok=true
            else
              echo "⚠️ aria2c failed or timed out."
              rm -f "$FILENAME"

              if download_with_curl; then
                download_ok=true
              else
                echo "⚠️ curl archive download also failed."
                rm -f "$FILENAME"

                if [ "$PROVIDER" = "github" ]; then
                  create_archive_from_git
                  download_ok=true
                else
                  echo "::error::No git fallback configured for provider: $PROVIDER"
                  download_ok=false
                fi
              fi
            fi
          fi

          if [ "$download_ok" != "true" ]; then
            echo "::error::Failed to download or create source archive: $SOURCE_URL"
            exit 1
          fi

          if [ ! -f "$FILENAME" ]; then
            echo "::error::Downloaded/generated file missing: $FILENAME"
            exit 1
          fi

          FILE_SIZE="$(stat -c%s "$FILENAME")"
          MAX_SIZE=2000000000 # ~1.86GB

          echo "📏 File size: $FILE_SIZE bytes"

          if [ "$FILE_SIZE" -le 0 ]; then
            echo "::error::Downloaded/generated file is empty: $FILENAME"
            exit 1
          fi

          echo "🧪 Validating archive..."

          if ! tar -tzf "$FILENAME" >/dev/null 2>&1; then
            echo "::error::Downloaded/generated file is not a valid tar.gz archive: $FILENAME"
            file "$FILENAME" || true
            head -c 500 "$FILENAME" || true
            exit 1
          fi

          echo "✅ Archive validation passed."

          if [ "$FILE_SIZE" -gt "$MAX_SIZE" ]; then
            echo "⚠️ File > 2GB. Splitting..."
            split -b 1500M -a 2 "$FILENAME" "${FILENAME}.part"

            uploaded_any=false

            for part in "${FILENAME}".part*; do
              if [ -f "$part" ]; then
                echo "📤 Uploading $part..."
                gh release upload "$TAG_NAME" "$part" --clobber --repo "$TARGET_REPO"
                uploaded_any=true
              fi
            done

            if [ "$uploaded_any" != "true" ]; then
              echo "::error::File was marked as large, but no split parts were created."
              exit 1
            fi

            echo "✅ Uploaded split archive parts for $FILENAME"
          else
            echo "📤 Uploading single file..."
            gh release upload "$TAG_NAME" "$FILENAME" --clobber --repo "$TARGET_REPO"

            echo "✅ Uploaded $FILENAME"
          fi
